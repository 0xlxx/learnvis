<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>learnvis/three — WebGPU prototype</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#1a1a2e;color:#eee;font-family:system-ui,sans-serif;
       display:flex;flex-direction:column;align-items:center;min-height:100vh}
  h1{font-size:1rem;padding:1rem 0 .3rem}
  .sub{font-size:.72rem;color:#888;margin-bottom:1rem}
  #app{width:720px;height:480px;border-radius:12px;overflow:hidden;
       border:1px solid rgba(255,255,255,.1)}
  #info{width:720px;margin-top:.8rem;font-size:.68rem;color:#666;
        display:flex;justify-content:space-between}
  #gpu{color:#22c55e}
  .note{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);
         border-radius:6px;padding:.4rem .6rem;margin-top:.5rem;font-size:.64rem;color:#22c55e}
</style>
</head>
<body>
<h1>learnvis/three — WebGPU prototype</h1>
<p class="sub">THROWAWAY · <span id="gpu">checking WebGPU…</span></p>
<div id="app"></div>
<div id="info"><span>drag to orbit · scroll to zoom</span><span id="entity-count">0 entities</span></div>
<div class="note" style="width:720px">WebGPU renderer · Chrome 113+ / Edge 113+</div>

<script type="importmap">
{ "imports": {
  "three/webgpu": "https://esm.sh/three@0.170.0/webgpu",
  "three/addons/": "https://esm.sh/three@0.170.0/examples/jsm/"
}}
</script>

<script type="module">
/* three/webgpu re-exports all THREE + WebGPURenderer built-in */
import * as THREE from 'three/webgpu';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── WebGPU support check ──
if (!navigator.gpu) {
  document.getElementById('gpu').innerHTML = '❌ WebGPU not available — use Chrome 113+';
  throw new Error('WebGPU not available');
}
document.getElementById('gpu').innerHTML = '✅ WebGPU';

const THEME = {
  axes: { x: 0xe06b38, y: 0x3b82f6, z: 0x22c55e },
  grid: 0x444444,
  bg: 0x1a1a2e,
};

// ══════════════════════════════════════════
// Gfx3d — fluent chain builder
// ══════════════════════════════════════════

class Gfx3dImpl {
  constructor(object3d) {
    this._obj = object3d;
    this._objects = [object3d];
  }

  color(c) {
    const hex = this._resolveColor(c);
    for (const o of this._objects) {
      o.traverse(ch => { if (ch.material && ch.material.color) ch.material.color.set(hex); });
    }
    return this;
  }
  opacity(v) {
    for (const o of this._objects) {
      o.traverse(ch => {
        if (ch.material) { ch.material.transparent = true; ch.material.opacity = v; }
      });
    }
    return this;
  }
  thickness(n) { this._thickness = n; return this; }
  wireframe() {
    for (const o of this._objects) {
      o.traverse(ch => { if (ch.material && !ch.isLine) ch.material.wireframe = true; });
    }
    return this;
  }
  emissive(c) {
    const hex = this._resolveColor(c);
    for (const o of this._objects) {
      o.traverse(ch => { if (ch.material && ch.material.emissive) ch.material.emissive.set(hex); });
    }
    return this;
  }
  label(t, offset) {
    const off = offset || [0, 0.7, 0];
    const canvas = document.createElement('canvas');
    canvas.width = 256; canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = '#ffffff'; ctx.font = '32px system-ui, sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(t, 128, 32);
    const tex = new THREE.CanvasTexture(canvas);
    tex.minFilter = THREE.LinearFilter;
    const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, depthTest: false });
    const sprite = new THREE.Sprite(mat);
    sprite.scale.set(1.2, 0.3, 1);
    sprite.position.copy(this._obj.position).add(new THREE.Vector3(...off));
    this._obj.add(sprite);
    return this;
  }
  translate(dx, dy, dz) { this._obj.position.x += dx; this._obj.position.y += dy; this._obj.position.z += dz; return this; }
  rotateX(rad) { this._obj.rotation.x += rad; return this; }
  rotateY(rad) { this._obj.rotation.y += rad; return this; }
  rotateZ(rad) { this._obj.rotation.z += rad; return this; }
  scale(sx, sy = sx, sz = sx) { this._obj.scale.set(sx, sy, sz); return this; }
  move(x, y, z) { this._obj.position.set(x, y, z); return this; }
  pos() { const p = this._obj.position; return [p.x, p.y, p.z]; }
  get object3d() { return this._obj; }

  _resolveColor(c) {
    const map = { danger:0xe06b38, primary:0xe06b38, accent:0x22c55e, info:0x3b82f6, warning:0xf59e0b, success:0x22c55e, dim:0x666666, muted:0x555555 };
    return map[c] || (typeof c === 'string' && c.startsWith('#') ? parseInt(c.slice(1), 16) : 0xffffff);
  }
}

function _makeArrow(from, to, colorHex, thickness = 0.06) {
  const dir = new THREE.Vector3().subVectors(new THREE.Vector3(...to), new THREE.Vector3(...from));
  const len = dir.length();
  const group = new THREE.Group();
  group.position.set(...from);

  const shaftGeo = new THREE.CylinderGeometry(thickness, thickness, len - 0.25, 8);
  const shaft = new THREE.Mesh(shaftGeo, new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.4 }));
  shaft.position.y = (len - 0.25) / 2;
  group.add(shaft);

  const coneGeo = new THREE.ConeGeometry(thickness * 3, 0.25, 8);
  const cone = new THREE.Mesh(coneGeo, new THREE.MeshStandardMaterial({ color: colorHex, roughness: 0.4 }));
  cone.position.y = len - 0.15;
  group.add(cone);

  const quat = new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0, 1, 0), dir.normalize());
  group.setRotationFromQuaternion(quat);
  return group;
}

// ══════════════════════════════════════════
// Scene3d — WebGPU backend
// ══════════════════════════════════════════

async function canvas3d(selector, opts = {}) {
  const container = typeof selector === 'string' ? document.querySelector(selector) : selector;
  const W = container.clientWidth, H = container.clientHeight;

  const renderer = new THREE.WebGPURenderer();
  renderer.setSize(W, H);
  renderer.setPixelRatio(opts.dpr || 2);
  container.appendChild(renderer.domElement);
  await renderer.init();  // WebGPU device setup — MUST be called before any rendering

  const scene = new THREE.Scene();
  scene.background = new THREE.Color(THEME.bg);

  const camera = new THREE.PerspectiveCamera(50, W/H, 0.1, 100);
  camera.position.set(5, 3, 5);
  camera.lookAt(0, 0, 0);

  const controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true; controls.dampingFactor = 0.08;
  controls.target.set(0, 0, 0);

  scene.add(new THREE.AmbientLight(0xffffff, 3));
  const dir = new THREE.DirectionalLight(0xffffff, 5);
  dir.position.set(5, 10, 3);
  scene.add(dir);

  const store = new Map();

  function axes3d(opts2 = {}) {
    const len = opts2.length || 4;
    const as = opts2.arrowSize || 0.2;
    const group = new THREE.Group();

    function axis(from, to, colorHex) {
      group.add(_makeArrow(from, to, colorHex, as * 0.3));
    }
    axis([0,0,0], [len,0,0], THEME.axes.x);
    axis([0,0,0], [-len,0,0], THEME.axes.x);
    axis([0,0,0], [0,len,0], THEME.axes.y);
    axis([0,0,0], [0,-len,0], THEME.axes.y);
    axis([0,0,0], [0,0,len], THEME.axes.z);
    axis([0,0,0], [0,0,-len], THEME.axes.z);

    scene.add(group);
    store.set('axes3d', group);
    return new Gfx3dImpl(group);
  }

  function grid3d(opts2 = {}) {
    const plane = opts2.plane || 'xz';
    const spacing = opts2.spacing || 1;
    const size = opts2.size || 10;
    const half = size / 2;
    const group = new THREE.Group();

    const points = [];
    for (let i = -half; i <= half; i += spacing) {
      if (Math.abs(i) < 0.001) continue;
      if (plane === 'xz') {
        points.push(new THREE.Vector3(i, 0, -half), new THREE.Vector3(i, 0, half));
        points.push(new THREE.Vector3(-half, 0, i), new THREE.Vector3(half, 0, i));
      }
    }
    const geo = new THREE.BufferGeometry().setFromPoints(points);
    const mat = new THREE.LineBasicMaterial({ color: THEME.grid, transparent: true, opacity: 0.4 });
    group.add(new THREE.LineSegments(geo, mat));
    scene.add(group);
    store.set('grid3d', group);
    return new Gfx3dImpl(group);
  }

  function vector(id, from, to) {
    const gfx = new Gfx3dImpl(_makeArrow(from, to, 0xe06b38));
    scene.add(gfx.object3d);
    store.set(id, gfx);
    return gfx;
  }

  function sphere(id, cx, cy, cz, r) {
    const geo = new THREE.SphereGeometry(r, 48, 32);
    const mat = new THREE.MeshStandardMaterial({ color: 0x22c55e, roughness: 0.3, metalness: 0.1 });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(cx, cy, cz);
    scene.add(mesh);
    const gfx = new Gfx3dImpl(mesh);
    store.set(id, gfx);
    return gfx;
  }

  function cube(id, cx, cy, cz, size) {
    const geo = new THREE.BoxGeometry(size, size, size);
    const edges = new THREE.EdgesGeometry(geo);
    const wire = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x3b82f6 }));
    const face = new THREE.Mesh(geo, new THREE.MeshStandardMaterial({ color: 0x3b82f6, roughness: 0.4, transparent: true, opacity: 0.2 }));
    const group = new THREE.Group();
    group.add(wire); group.add(face);
    group.position.set(cx, cy, cz);
    scene.add(group);
    const gfx = new Gfx3dImpl(group);
    store.set(id, gfx);
    return gfx;
  }

  function group(entities) {
    const grp = new THREE.Group();
    for (const e of entities) {
      scene.remove(e.object3d);
      grp.add(e.object3d);
    }
    scene.add(grp);
    return new Gfx3dImpl(grp);
  }

  function render(fn) {
    fn({ vector, sphere, cube, axes3d, grid3d, group });
  }

  function cam(config) {
    if (config.position) camera.position.set(...config.position);
    if (config.target) controls.target.set(...config.target);
    controls.update();
  }

  renderer.setAnimationLoop(() => {
    controls.update();
    renderer.render(scene, camera);
    document.getElementById('entity-count').textContent = `${store.size} entities`;
  });

  return { render, axes3d, grid3d, vector, sphere, cube, group, camera: cam,
           three: scene, camera3d: camera, renderer3d: renderer };

  window.addEventListener('resize', () => {
    const w2 = container.clientWidth, h2 = container.clientHeight;
    camera.aspect = w2/h2; camera.updateProjectionMatrix();
    renderer.setSize(w2, h2);
  });
}

// ══════════════════════════════════════════
// DEMO
// ══════════════════════════════════════════

const s = await canvas3d('#app');

s.render(() => {
  s.axes3d();
  s.grid3d({ plane: 'xz', spacing: 1, size: 6 });

  s.vector('i', [0,0,0], [2,0,0]).color('danger').label('î');
  s.vector('j', [0,0,0], [0,2,0]).color('info').label('ĵ');
  s.vector('k', [0,0,0], [0,0,2]).color('accent').label('k̂');
  s.vector('v', [0,0,0], [1, 1.5, 0.5]).color('warning').label('v').thickness(0.08);

  s.sphere('S', 0, 0, 0, 0.8).color('accent').opacity(0.3).wireframe();

  s.sphere('a', -2, 0, 0, 0.5).color('danger').opacity(0.4);
  s.sphere('b',  2, 0, 0, 0.5).color('info').opacity(0.4);
  s.vector('conn', [-1.5, 0, 0], [1.5, 0, 0]).color('primary').thickness(0.04);
});

console.log('✅ WebGPU prototype ready');
</script>
</body>
</html>

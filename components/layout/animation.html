<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Layout — learnvis</title>
  <link rel="stylesheet" href="../../theme.css">
  <style>
    *,*::before,*::after{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem 2rem 4rem;line-height:1.6}
    h1{font-size:1.3rem;margin:0 0 .3rem}
    .sub{color:var(--text-muted);font-size:.82rem;margin:0 0 1.5rem}
    section{margin-bottom:2.5rem}
    section h2{font-size:.95rem;margin:0 0 4px}
    .desc{font-size:.72rem;color:var(--text-muted);margin-bottom:10px}
    .row{display:flex;gap:20px;flex-wrap:wrap}
    .card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center}
    .card .stage{width:400px;height:280px;display:block}
    .stepper{display:flex;gap:4px;margin-top:8px;justify-content:center;flex-wrap:wrap}
    .stepper button{font-size:.65rem;padding:3px 10px;border:1px solid var(--border);border-radius:5px;background:var(--card);cursor:pointer;transition:all .15s}
    .stepper button:hover{border-color:var(--blue);background:var(--blue-03)}
    .stepper button.active{background:var(--blue);color:#fff;border-color:var(--blue)}
  </style>
</head>
<body>

<h1>Layout Primitives</h1>
<p class="sub">node · block · port · edge · layer · enclosure — composable algorithm visualization</p>
<div class="row" id="sections"></div>

<script src="../../dist/learnvis.js"></script>

<script type="module">
const THEME = 'paper';
const W = 400, H = 280;

// ═══════════════════════════════════════════════════════════
//  1. 链表 — node + port + edge
// ═══════════════════════════════════════════════════════════

const xs = [80, 200, 320];
const linkedItems = [
  ['A'],
  ['A', 'B'],
  ['A', 'B', 'C'],
];
const linkedListSteps = linkedItems.map(keys => ({
  label: keys.join(' → '),
  frame: s => {
    const ly = s.layout;
    ly.layer('bg', 0, { y: 90, h: 110, w: W, color: 'dim', style: 'band', opacity: 0.25 });
    keys.forEach((k, i) => {
      const nx = xs[i], ny = 110;
      const n = ly.node(k, nx, ny, { w: 48, h: 34, rx: 7, labelPlace: 'above' })
        .color('primary').label(k);
      n.port(`${k}-out`, [28, 0], { size: 6 }).color('primary');
      if (i > 0) n.port(`${k}-in`, [-28, 0], { size: 6 }).color('primary');
    });
    for (let i = 0; i < keys.length - 1; i++) {
      ly.edge(`${keys[i]}-${keys[i+1]}`, `${keys[i]}-out`, `${keys[i+1]}-in`)
        .color('primary').directed(true).strokeW(1.6);
    }
  },
}));

// ═══════════════════════════════════════════════════════════
//  2. 调用栈 — block + fit + enclosure
// ═══════════════════════════════════════════════════════════

const callstackData = [
  [{ id: 'main', x: 200, y: 220, w: 140, h: 36, style: 'active' }],
  [
    { id: 'main', x: 200, y: 180, w: 140, h: 36, style: 'normal' },
    { id: 'sort', x: 200, y: 235, w: 170, h: 40, style: 'active' },
  ],
  [
    { id: 'main', x: 200, y: 140, w: 140, h: 36, style: 'muted' },
    { id: 'sort', x: 200, y: 195, w: 170, h: 40, style: 'normal' },
    { id: 'swap', x: 200, y: 250, w: 180, h: 40, style: 'active' },
  ],
];
const callstackSteps = callstackData.map((frames, idx) => ({
  label: `${idx + 1} 帧`,
  frame: s => {
    const ly = s.layout;
    if (frames.length > 1) {
      ly.enclosure('stack', 60, 110, 280, frames.length * 56 + 16, {
        color: 'muted', dash: '6 3', rx: 12,
      }).strokeW(1);
    }
    frames.forEach(f => {
      const b = ly.block(f.id, f.x, f.y, f.w, f.h, {
        style: f.style ?? 'normal', rx: 6, labelPlace: 'below',
      }).label(f.id);
    });
  },
}));

// ═══════════════════════════════════════════════════════════
//  3. 阶段分区 — layer + enclosure + port/edge
// ═══════════════════════════════════════════════════════════

const phases = ['Input', 'Process', 'Output'];
const phaseColors = ['info', 'warning', 'success'];

const phaseSteps = [
  {
    label: '空分区',
    frame: s => {
      phases.forEach((p, i) => {
        s.layout.layer(p, i, { totalRanks: phases.length, w: W, color: phaseColors[i], style: 'band', opacity: 0.25 });
        s.ctx.callout({ x: 380, y: 60 + i * 70 + 30 }, p, { place: 'right', gap: 6, style: { fontSize: '10px' } });
      });
    },
  },
  {
    label: '处理中',
    frame: s => {
      const ly = s.layout;
      phases.forEach((p, i) => {
        ly.layer(p, i, { totalRanks: phases.length, w: W, color: phaseColors[i], style: 'band', opacity: 0.25 });
        s.ctx.callout({ x: 380, y: 60 + i * 70 + 30 }, p, { place: 'right', gap: 6, style: { fontSize: '10px' } });
      });
      ly.node('in', 130, 95, { w: 50, h: 28, rx: 5 }).color('info').label('data');
      ly.node('proc', 130, 165, { w: 60, h: 28, rx: 5 }).color('warning').label('work');
      ly.enclosure('active', 55, 40, 190, 180, {
        color: 'accent', dash: '8 4', rx: 12,
      }).strokeW(1.5).label('Phase 1–2').opacity(0.6);
    },
  },
  {
    label: '完成',
    frame: s => {
      const ly = s.layout;
      phases.forEach((p, i) => {
        ly.layer(p, i, { totalRanks: phases.length, w: W, color: phaseColors[i], style: 'band', opacity: 0.25 });
        s.ctx.callout({ x: 380, y: 60 + i * 70 + 30 }, p, { place: 'right', gap: 6, style: { fontSize: '10px' } });
      });
      const inp  = ly.node('in', 130, 95, { w: 50, h: 28, rx: 5 }).color('info').label('data');
      const proc = ly.node('proc', 130, 165, { w: 60, h: 28, rx: 5 }).color('warning').label('work');
      const out  = ly.node('out', 130, 235, { w: 50, h: 28, rx: 5 }).color('success').label('result');
      inp.port('in-out', 'bottom', { size: 4 });
      proc.port('proc-in', 'top', { size: 4 });
      proc.port('proc-out', 'bottom', { size: 4 });
      out.port('out-in', 'top', { size: 4 });
      ly.edge('e1', 'in-out', 'proc-in').color('dim').directed(true).strokeW(1.4);
      ly.edge('e2', 'proc-out', 'out-in').color('dim').directed(true).strokeW(1.4);
    },
  },
];

// ═══════════════════════════════════════════════════════════
//  4. 二叉树 — node + port + edge 层序展示
// ═══════════════════════════════════════════════════════════

const tree = {
  v: '8',
  L: { v: '3', L: { v: '1' }, R: { v: '6', L: { v: '4' }, R: { v: '7' } } },
  R: { v: '10', R: { v: '14', L: { v: '13' } } },
};

const positions = {
  '8': [200, 42],  '3': [120, 108], '1': [68, 175],  '6': [172, 175],
  '4': [140, 240], '7': [204, 240], '10': [280, 108], '14': [332, 175],
  '13': [300, 240],
};
const childMap = {
  '8': ['3', '10'], '3': ['1', '6'], '6': ['4', '7'],
  '10': [null, '14'], '14': ['13', null],
};

// BFS order: each entry is either a node value (string) or an edge descriptor (parent→dir)
const bfsOrder = [];
{
  const queue = [tree];
  while (queue.length) {
    const n = queue.shift();
    bfsOrder.push(n.v);
    if (n.L) { bfsOrder.push(`${n.v}→L`); queue.push(n.L); }
    if (n.R) { bfsOrder.push(`${n.v}→R`); queue.push(n.R); }
  }
}

const treeSteps = [];
const seen = [];
for (const v of bfsOrder) {
  seen.push(v);
  const snapshot = [...seen];
  const nodeSet = new Set(snapshot.map(s => s.replace('→L', '').replace('→R', '')));
  const edges = snapshot.filter(s => s.includes('→'));

  treeSteps.push({
    label: v,
    frame: s => {
      const ly = s.layout;
      // nodes
      for (const val of nodeSet) {
        const [px, py] = positions[val] ?? [200, 42];
        const n = ly.node(val, px, py, { w: 36, h: 28, rx: 6 }).color('primary').label(val);
        n.port(`${val}-L`, 'left', { size: 3 }).color('dim');
        n.port(`${val}-R`, 'right', { size: 3 }).color('dim');
      }
      // edges
      // edges
      for (const e of edges) {
        const [parent, dir] = e.split('→');
        const childId = dir === 'L' ? childMap[parent]?.[0] : childMap[parent]?.[1];
        if (!childId || !nodeSet.has(childId)) continue;
        const fromPort = `${parent}-${dir}`;
        const toDir = dir === 'L' ? 'R' : 'L';
        const toPort = `${childId}-${toDir}`;
        ly.edge(`${parent}-${childId}`, fromPort, toPort)
          .color('accent').strokeW(1.4);
      }
    },
  });
}

// ═══════════════════════════════════════════════════════════
//  5. Sugiyama 管道 — layer + node + port + edge + polyline
// ═══════════════════════════════════════════════════════════

const sugiyamaNodes = { A: [200,80], B: [340,80], C: [270,180], D: [200,280], E: [340,280] };
const sugiyamaEdges = [['A','C'],['B','C'],['C','D'],['C','E'],['A','E']];
const sugiyamaSteps = [
  {
    label: 'P1: 消环',
    frame: s => {
      const ly = s.layout;
      [0,1,2].forEach(i => ly.layer('L'+i, i, { totalRanks:3, w:W, startY:50, endY:250, layerGap:4, color:['info','warning','success'][i], style:'band', opacity:0.18 }));
      for (const [k,[x,y]] of Object.entries(sugiyamaNodes)) {
        const n = ly.node(k, x, y, { w: 44, h: 28, rx: 5 }).color('primary').label(k);
        n.port(k+'-in','top',{size:3}).color('dim');
        n.port(k+'-out','bottom',{size:3}).color('dim');
      }
      for (const [s,d] of sugiyamaEdges) ly.edge(s+'-'+d, s+'-out', d+'-in').color('dim').directed(true).strokeW(1.4);
    },
  },
  {
    label: 'P5: 正交路由',
    frame: s => {
      [0,1,2].forEach(i => s.layout.layer('L'+i, i, { totalRanks:3, w:W, startY:50, endY:250, layerGap:4, color:['info','warning','success'][i], style:'band', opacity:0.18 }));
      for (const [k,[x,y]] of Object.entries(sugiyamaNodes)) {
        s.layout.node(k, x, y, { w: 44, h: 28, rx: 5 }).color('primary').label(k);
      }
      for (const [s,d] of sugiyamaEdges) {
        const sx = sugiyamaNodes[s][0], sy = sugiyamaNodes[s][1];
        const dx = sugiyamaNodes[d][0], dy = sugiyamaNodes[d][1];
        const midY = (sy + dy) / 2;
        s.math.polyline(s+'-'+d, [[sx,sy],[sx,midY],[dx,midY],[dx,dy]]).color('dim').strokeW(1.5);
      }
    },
  },
];

// ═══════════════════════════════════════════════════════════
//  Render
// ═══════════════════════════════════════════════════════════

const demos = [
  { name: '链表',     desc: 'node() 节点, port() 端口, edge() 有向边。逐步构建。', steps: linkedListSteps },
  { name: '调用栈',   desc: 'block() 栈帧 + fit() 自动尺寸 + enclosure() 包围框。', steps: callstackSteps },
  { name: '阶段分区', desc: 'layer() 背景色带 + enclosure() 虚线框 + port/edge 连线。', steps: phaseSteps },
  { name: '二叉树',   desc: 'BFS 层序遍历, port + edge 父子连线。', steps: treeSteps },
  { name: 'Sugiyama', desc: 'layer() 分层 + edge() 直线 + polyline() 正交路由。', steps: sugiyamaSteps },
];

const container = document.getElementById('sections');
for (const [si, demo] of demos.entries()) {
  const section = document.createElement('section');
  section.innerHTML = `<h2>${demo.name}</h2><div class="desc">${demo.desc}</div>
    <div class="card">
      <div class="stage" id="st${si}"></div>
      <div class="stepper" id="sp${si}"></div>
    </div>`;
  container.appendChild(section);

  const s = LearnVis.stage(`#st${si}`, { width: W, height: H, theme: THEME });
  const ctrl = s.steps(demo.steps);

  const stepper = document.getElementById(`sp${si}`);
  for (const [i, step] of demo.steps.entries()) {
    const btn = document.createElement('button');
    btn.textContent = step.label;
    btn.addEventListener('click', () => ctrl.go(i));
    stepper.appendChild(btn);
  }
  ctrl.onChange(i => {
    for (const [j, b] of [...stepper.children].entries()) {
      b.classList.toggle('active', j === i);
    }
  });
}
</script>
</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>Layout — Style Candidates</title>
  <link rel="stylesheet" href="../../theme.css">
  <style>
    *,*::before,*::after{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem;line-height:1.6}
    h1{font-size:1.3rem;margin:0 0 .3rem}
    .sub{color:var(--text-muted);font-size:.82rem;margin:0 0 1.5rem}
    section{margin-bottom:2.5rem}
    section h2{font-size:.95rem;margin:0 0 4px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center}
    .card .name{font-size:.7rem;color:var(--text-dim);margin-bottom:4px}
    .card .stage{width:280px;height:200px;display:block}
  </style>
</head>
<body>

<h1>Layout — Style Candidates</h1>
<p class="sub">block styles · layer (band / swimlane) · polyline routing</p>
<div id="sections"></div>

<script src="../../dist/learnvis.js"></script>

<script type="module">
const W = 280, H = 200;

const sections = [
  // ── Block style variants ──
  {
    name: 'Block styles',
    desc: 'muted / normal / active',
    candidates: ['muted', 'normal', 'active'].map(style => ({
      label: style,
      draw: s => {
        s.layout.block('b', 40, 50, 200, 100, { style, rx: 10 }).label(style);
      },
    })),
  },
  // ── Layer styles ──
  {
    name: 'Layer styles',
    desc: 'band (纯色) / swimlane (泳道) / multi-rank (分层)',
    candidates: [
      {
        label: 'band',
        draw: s => {
          s.layout.layer('L', 0, { y: 30, h: 140, w: W, color: 'accent', label: 'Phase 1' });
          s.layout.node('n', 140, 100, { w: 80, h: 36, rx: 6 }).color('primary').label('content');
        },
      },
      {
        label: 'swimlane',
        draw: s => {
          s.layout.layer('L', 0, { y: 20, h: 160, w: W - 20, x: 10, color: 'info', style: 'swimlane', label: 'Phase 1' });
          s.layout.node('a', 100, 100, { w: 60, h: 28, rx: 5 }).color('primary').label('A');
          s.layout.node('b', 180, 100, { w: 60, h: 28, rx: 5 }).color('primary').label('B');
        },
      },
      {
        label: 'multi-rank',
        draw: s => {
          const totalRanks = 3, startY = 20, endY = 180, layerGap = 4;
          const available = endY - startY;
          const h = (available - (totalRanks - 1) * layerGap) / totalRanks;
          const cy = (r) => startY + r * (h + layerGap) + h / 2;
          const colors = ['info', 'warning', 'success'];
          for (let i = 0; i < totalRanks; i++) {
            s.layout.layer(`r${i}`, i, { totalRanks, w: W, startY, endY, layerGap, color: colors[i], label: `Rank ${i}` });
          }
          s.layout.node('n', 140, cy(0), { w: 50, h: 24, rx: 4 }).color('primary').label('data');
          s.layout.node('n2', 140, cy(1), { w: 50, h: 24, rx: 4 }).color('primary').label('proc');
          s.layout.node('n3', 140, cy(2), { w: 50, h: 24, rx: 4 }).color('primary').label('out');
        },
      },
    ],
  },
  // ── Node sizes ──
  {
    name: 'Node sizes',
    desc: 'default / wide / large',
    candidates: [
      {
        label: 'default (32x24)',
        draw: s => {
          s.layout.node('n', 140, 100, { rx: 4 }).color('primary').label('A');
        },
      },
      {
        label: 'wide (80x28)',
        draw: s => {
          s.layout.node('n', 140, 100, { w: 80, rx: 4 }).color('primary').label('Long Text');
        },
      },
      {
        label: 'large (60x40)',
        draw: s => {
          s.layout.node('n', 140, 100, { w: 60, h: 40, rx: 6 }).color('primary').label('Big');
        },
      },
    ],
  },
  // ── Edge styles ──
  {
    name: 'Edge styles',
    desc: 'directed / undirected / dashed / bend',
    candidates: [
      {
        label: 'directed',
        draw: s => {
          const ly = s.layout;
          const a = ly.node('A', 60, 100, { w: 44, h: 32, rx: 6 }).color('primary').label('A');
          const b = ly.node('B', 220, 100, { w: 44, h: 32, rx: 6 }).color('primary').label('B');
          a.port('A-out', 'right', { size: 4 }).color('primary');
          b.port('B-in', 'left', { size: 4 }).color('primary');
          ly.edge('A-B', 'A-out', 'B-in').color('primary').directed(true).strokeW(1.6);
        },
      },
      {
        label: 'undirected',
        draw: s => {
          const ly = s.layout;
          const a = ly.node('A', 60, 100, { w: 44, h: 32, rx: 6 }).color('primary').label('A');
          const b = ly.node('B', 220, 100, { w: 44, h: 32, rx: 6 }).color('primary').label('B');
          a.port('A-out', 'right', { size: 4 }).color('primary');
          b.port('B-in', 'left', { size: 4 }).color('primary');
          ly.edge('A-B', 'A-out', 'B-in').color('primary').strokeW(1.6);
        },
      },
      {
        label: 'dashed',
        draw: s => {
          const ly = s.layout;
          const a = ly.node('A', 60, 100, { w: 44, h: 32, rx: 6 }).color('dim').label('A');
          const b = ly.node('B', 220, 100, { w: 44, h: 32, rx: 6 }).color('dim').label('B');
          a.port('A-out', 'right', { size: 4 }).color('dim');
          b.port('B-in', 'left', { size: 4 }).color('dim');
          ly.edge('A-B', 'A-out', 'B-in').color('dim').dashed('6 3').strokeW(1.2);
        },
      },
    ],
  },
  // ── Polyline routing ──
  {
    name: 'Polyline — orthogonal routing',
    desc: 'multi-segment lines for edge routing (replaces manual polygon arrow)',
    candidates: [
      {
        label: '↕ 3-segment',
        draw: s => {
          const sx = 60, sy = 60, dx = 200, dy = 140, midY = (sy + dy) / 2;
          s.math.polyline('r1', [[sx,sy],[sx,midY],[dx,midY],[dx,dy]]).color('accent').strokeW(1.8);
          s.math.point('src', [sx,sy]).size(4).color('primary').label('A');
          s.math.point('dst', [dx,dy]).size(4).color('primary').label('B');
        },
      },
      {
        label: '↔ horizontal',
        draw: s => {
          const sx = 60, sy = 100, dx = 210, dy = 100, midX = (sx + dx) / 2;
          s.math.polyline('r2', [[sx,sy],[midX,sy-20],[midX,dy+20],[dx,dy]]).color('warning').strokeW(1.5);
          s.math.point('src', [sx,sy]).size(4).color('primary').label('A');
          s.math.point('dst', [dx,dy]).size(4).color('primary').label('B');
        },
      },
      {
        label: 'dashed bend',
        draw: s => {
          const sx = 60, sy = 80, dx = 210, dy = 150;
          s.math.polyline('r3', [[sx,sy],[sx+50,sy],[sx+50,dy],[dx,dy]]).color('dim').dashed('4 3').strokeW(1.5);
          s.math.point('src', [sx,sy]).size(4).color('primary').label('A');
          s.math.point('dst', [dx,dy]).size(4).color('primary').label('B');
        },
      },
    ],
  },
  // ── Block with ports ──
  {
    name: 'Block + ports',
    desc: 'block as container with attached ports',
    candidates: [
      {
        label: 'simple block',
        draw: s => {
          const b = s.layout.block('blk', 40, 50, 200, 100, { style: 'normal', rx: 8 }).label('Container');
          b.port('blk-top', 'top', { size: 5 }).color('primary');
          b.port('blk-right', 'right', { size: 5 }).color('primary');
          b.port('blk-bottom', 'bottom', { size: 5 }).color('primary');
          b.port('blk-left', 'left', { size: 5 }).color('primary');
        },
      },
      {
        label: 'block + edge',
        draw: s => {
          const a = s.layout.block('src', 20, 50, 90, 100, { style: 'normal', rx: 6 }).label('Source');
          const b = s.layout.block('dst', 170, 50, 90, 100, { style: 'active', rx: 6 }).label('Target');
          a.port('src-out', 'right', { size: 5 }).color('primary');
          b.port('dst-in', 'left', { size: 5 }).color('primary');
          s.layout.edge('e', 'src-out', 'dst-in').color('primary').directed(true).strokeW(1.6);
        },
      },
      {
        label: 'block inside block',
        draw: s => {
          s.layout.block('outer', 30, 30, 220, 140, { style: 'muted', rx: 10 }).label('Outer');
          s.layout.block('inner', 95, 80, 90, 60, { style: 'normal', rx: 6 }).label('Inner');
        },
      },
    ],
  },
];

// ── Render ──

const container = document.getElementById('sections');
for (const [si, sec] of sections.entries()) {
  const el = document.createElement('section');
  el.innerHTML = `<h2>${sec.name}</h2><p class="sub">${sec.desc}</p><div class="row" id="r${si}"></div>`;
  container.appendChild(el);

  const row = document.getElementById(`r${si}`);
  for (const [j, c] of sec.candidates.entries()) {
    const id = `st${si}_${j}`;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="name">${c.label}</div><div class="stage" id="${id}"></div>`;
    row.appendChild(card);
    const s = LearnVis.stage(`#${id}`, { width: W, height: H, theme: 'paper' });
    s.frames.begin();
    c.draw(s);
    s.frames.commit({ animate: false });
  }
}
</script>
</body>
</html>

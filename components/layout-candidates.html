<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Layout — Style Candidates</title>
  <link rel="stylesheet" href="../theme.css">
  <style>
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem;line-height:1.6}
    h1{font-size:1.3rem;margin:0 0 0.3rem}
    .sub{color:var(--text-muted);font-size:0.82rem;margin:0 0 1.5rem}
    section{margin-bottom:2rem}
    section h2{font-size:0.9rem;margin:0 0 6px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center}
    .card .name{font-size:0.7rem;color:var(--text-dim);margin-bottom:4px}
    .card .stage{width:280px;height:200px;display:block}
  </style>
</head>
<body>

<h1>Layout — Style Candidates</h1>
<p class="sub">Grid splits, gap sizes, border styles</p>

<div id="sections"></div>

<script src="../dist/learnvis.js"></script>
<script>
const sections = [
  {
    name: 'Split direction',
    desc: 'hsplit / vsplit / grid',
    candidates: [
      {
        label: 'hsplit 50/50',
        draw(s) {
          const W=280, H=200, M=10;
          s.zone(M, M, 126, H-20, '', 'dim');
          s.zone(M+134, M, 126, H-20, '', 'dim');
          s.ctx.callout({x:M+63,y:M+H/2},'A',{place:'above',gap:4,style:{fontSize:'10px'}});
          s.ctx.callout({x:M+134+63,y:M+H/2},'B',{place:'above',gap:4,style:{fontSize:'10px'}});
        }
      },
      {
        label: 'vsplit 40/60',
        draw(s) {
          const W=280, H=200, M=10;
          s.zone(M, M, W-20, 72, '', 'dim');
          s.zone(M, M+80, W-20, 110, '', 'dim');
        }
      },
      {
        label: 'grid 2×2',
        draw(s) {
          const W=280, H=200, M=10, g=6;
          const cw=(W-2*M-g)/2, ch=(H-2*M-g)/2;
          [[0,0],[0,1],[1,0],[1,1]].forEach(([r,c]) => {
            s.zone(M+c*(cw+g), M+r*(ch+g), cw, ch, '', 'dim');
          });
        }
      },
      {
        label: 'grid 1×3',
        draw(s) {
          const W=280, H=200, M=10, g=6;
          const cw=(W-2*M-2*g)/3;
          [0,1,2].forEach(c => s.zone(M+c*(cw+g), M, cw, H-20, '', 'dim'));
        }
      },
    ]
  },
  {
    name: 'Gap size',
    desc: '4px / 8px / 16px / 0px',
    candidates: [
      { label:'4px', draw(s){
        const W=280,H=200,M=10,g=4,cw=(W-2*M-g)/2,ch=(H-2*M-g)/2;
        for(let r=0;r<2;r++)for(let c=0;c<2;c++) s.zone(M+c*(cw+g),M+r*(ch+g),cw,ch,'','dim');
      }},
      { label:'8px', draw(s){
        const W=280,H=200,M=10,g=8,cw=(W-2*M-g)/2,ch=(H-2*M-g)/2;
        for(let r=0;r<2;r++)for(let c=0;c<2;c++) s.zone(M+c*(cw+g),M+r*(ch+g),cw,ch,'','dim');
      }},
      { label:'16px', draw(s){
        const W=280,H=200,M=10,g=16,cw=(W-2*M-g)/2,ch=(H-2*M-g)/2;
        for(let r=0;r<2;r++)for(let c=0;c<2;c++) s.zone(M+c*(cw+g),M+r*(ch+g),cw,ch,'','dim');
      }},
      { label:'0px', draw(s){
        const W=280,H=200,M=10,g=0,cw=(W-2*M)/2,ch=(H-2*M)/2;
        for(let r=0;r<2;r++)for(let c=0;c<2;c++) s.zone(M+c*cw,M+r*ch,cw,ch,'','dim');
      }},
    ]
  },
  {
    name: 'Border style',
    desc: 'subtle / visible / dashed / none',
    candidates: [
      { label:'subtle', draw(s){
        s.zone(10,10,260,180,'','dim');
      }},
      { label:'visible', draw(s){
        s.zone(10,10,260,180,'','dim');
        const c=s.palette.dim; const g=s.ctx.stage.bg;
        g.selectAll('rect[data-id^="block-"]').attr('stroke',c.fg).attr('stroke-width',1.5);
      }},
      { label:'dashed', draw(s){
        s.zone(10,10,260,180,'','dim');
        const g=s.ctx.stage.bg;
        g.selectAll('rect[data-id^="block-"]').attr('stroke-dasharray','4 3').attr('stroke-width',1);
      }},
      { label:'none', draw(s){
        s.zone(10,10,260,180,'','dim');
        const g=s.ctx.stage.bg;
        g.selectAll('rect[data-id^="block-"]').attr('stroke','none');
      }},
    ]
  },
];

const container = document.getElementById('sections');
let stageId = 0;
sections.forEach(sec => {
  const el = document.createElement('section');
  el.innerHTML = `<h2>${sec.name}</h2><div class="row" id="r${stageId}"></div>`;
  container.appendChild(el);
  const row = document.getElementById('r' + stageId);
  sec.candidates.forEach((c, j) => {
    const id = 'st' + stageId + '_' + j;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="name">${c.label}</div><div class="stage" id="${id}"></div>`;
    row.appendChild(card);
    const s = LearnVis.stage('#' + id, { width: 280, height: 200, theme: 'warm' });
    c.draw(s);
  });
  stageId++;
});
</script>
</body>
</html>

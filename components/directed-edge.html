<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Directed Edge — Style Candidates</title>
  <link rel="stylesheet" href="../theme.css">
  <style>
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem;line-height:1.6}
    h1{font-size:1.3rem;margin:0 0 0.3rem}
    .sub{color:var(--text-muted);font-size:0.82rem;margin:0 0 1.5rem}
    section{margin-bottom:2rem}
    section h2{font-size:0.9rem;margin:0 0 6px}
    .desc{font-size:0.72rem;color:var(--text-muted);margin-bottom:8px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center}
    .card .name{font-size:0.7rem;color:var(--text-dim);margin-bottom:4px}
    .card .stage{width:200px;height:120px;display:block}
  </style>
</head>
<body>

<h1>Directed Edge — Style Candidates</h1>
<p class="sub">Arrowhead + line weight combinations</p>

<div id="sections"></div>

<script src="../dist/learnvis.js"></script>
<script>
const sections = [
  {
    name: 'Stroke width',
    desc: '0.8 / 1.2 / 1.8 / 2.5',
    draw(c, s) {
      const a=s.graph.vertex('A',[30,60],{r:8,label:''}), b=s.graph.vertex('B',[170,60],{r:8,label:''});
      s.graph.edge(a,b,{strokeW:c});
    },
    values: [0.8, 1.2, 1.8, 2.5],
  },
  {
    name: 'Color',
    desc: 'dim / primary / accent / danger',
    draw(c, s) {
      const a=s.graph.vertex('A',[30,60],{r:8,label:''}), b=s.graph.vertex('B',[170,60],{r:8,label:''});
      s.graph.edge(a,b,{stroke:s.palette[c]?.fg||c,strokeW:1.8});
    },
    values: ['dim','primary','accent','danger'],
  },
  {
    name: 'Dash',
    desc: 'solid / 5 4 / 2 3 / 10 4 2 4',
    draw(c, s) {
      const a=s.graph.vertex('A',[30,60],{r:8,label:''}), b=s.graph.vertex('B',[170,60],{r:8,label:''});
      // dash via segment overlay (graph.edge doesn't support dash directly)
      s.math.segment([a.x,a.y],[b.x,b.y]).stroke(p(s).dim.fg,1.5).dashed(c);
    },
    values: ['', '5 4', '2 3', '10 4 2 4'],
    labels: ['solid','5 4','2 3','dash-dot'],
  },
  {
    name: 'Edge-to-node gap',
    desc: '0 / 3 / 6 / 10 px',
    draw(c, s) {
      const a=s.graph.vertex('A',[30,60],{r:8,label:''}), b=s.graph.vertex('B',[170,60],{r:8,label:''});
      s.graph.edge(a,b,{gap:c});
    },
    values: [0, 3, 6, 10],
  },
];

function p(s){return s.palette}

const container = document.getElementById('sections');
let stageId = 0;
sections.forEach(sec => {
  const el = document.createElement('section');
  el.innerHTML = `<h2>${sec.name}</h2><div class="desc">${sec.desc}</div><div class="row" id="r${stageId}"></div>`;
  container.appendChild(el);
  const row = document.getElementById('r' + stageId);
  const vals = sec.values;
  (sec.labels||vals).forEach((lb, j) => {
    const id = 'st' + stageId + '_' + j;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="name">${lb}</div><div class="stage" id="${id}"></div>`;
    row.appendChild(card);
    const s = LearnVis.stage('#' + id, { width: 200, height: 120, theme: 'warm' });
    sec.draw(vals[j], s);
  });
  stageId++;
});
</script>
</body>
</html>

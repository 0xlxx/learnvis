<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>learnvis — zero CSS</title>
</head>
<body style="background:#fafaf8;font-family:system-ui,sans-serif;margin:2rem;">

<h3>Zero CSS — 仅 JS</h3>
<p style="color:#888;font-size:.8rem;">无 &lt;link&gt; 标签，无外部样式表。SVG 全部由 JS 生成。</p>

<div id="stage"></div>

<script src="../dist/learnvis.js"></script>
<script>
const s = LearnVis.stage('#stage', { width: 520, height: 200, theme: 'warm' });

// All 5 layout primitives in one frame, no CSS needed
s.frames.begin();
s.layout.layer('bg', 0, { y: 20, h: 160, w: 520, color: 'info', style: 'band', opacity: 0.15, label: 'Layer' });
s.math.point('P', [260, 100]).color('danger').label('point').size(6);
s.math.polyline('route', [[80,140],[160,140],[160,40],[300,40]]).color('accent').strokeW(1.8);
s.math.segment('sep', [400,40],[480,140]).color('dim').dashed('4 3');
s.layout.node('N', 260, 100, { w: 60, h: 30, rx: 5 }).color('primary').label('node');
s.layout.block('B', 380, 60, 100, 80, { style: 'active', rx: 6 }).label('block');
s.frames.commit({ animate: false });
</script>

</body>
</html>

<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>learnvis — zero CSS</title>
</head>
<body style="background:#fafaf8;font-family:system-ui,sans-serif;margin:2rem;">

<h3>Zero CSS — 仅 JS</h3>
<p style="color:#888;font-size:.8rem;">无 &lt;link&gt; 标签，无外部样式表。SVG 全部由 JS 生成。</p>

<div id="app"></div>

<script type="module">
import { canvas } from 'learnvis';

const s = canvas('#app', { width: 520, height: 200, theme: 'warm' });

s.render(() => {
  // layer → fill rectangle
  s.fill('bg', [[0, 20], [520, 20], [520, 180], [0, 180]]).color('info').opacity(0.15).label('Layer', 'left');

  s.point('P', 260, 100).color('danger').label('point').size(6);
  s.polyline('route', [[80,140],[160,140],[160,40],[300,40]]).color('accent').stroke(2);
  s.line('sep', 400, 40, 480, 140).color('dim').dash('4 3');

  s.block('N', 230, 85, 60, 30).color('primary').label('node');
  s.block('B', 330, 40, 100, 80).color('primary').label('block');
});
</script>

</body>
</html>

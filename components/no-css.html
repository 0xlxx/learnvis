<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>learnvis — zero CSS</title>
</head>
<body style="background:#fafaf8;font-family:system-ui,sans-serif;margin:2rem;">

<h3>Zero CSS — 仅 JS</h3>
<p style="color:#888;font-size:.8rem;">无 &lt;link&gt; 标签，无外部样式表。SVG 全部由 JS 生成。</p>

<div id="stage"></div>

<script type="module">
import { stage } from '../dist/learnvis.mjs';

const s = stage('#stage', { width: 520, height: 200, theme: 'warm' });
const { point, polyline, segment } = s.math;
const { layer, block } = s.graph;

s.render(() => {
  layer('bg', 0, { y: 20, h: 160, w: 520, color: 'info', style: 'band', opacity: 0.15, label: 'Layer' });
  point('P', [260, 100]).color('danger').label('point').size(6);
  polyline('route', [[80,140],[160,140],[160,40],[300,40]]).color('accent').strokeW(1.8);
  segment('sep', [400,40],[480,140]).color('dim').dashed('4 3');
  block('N', 230, 85, 60, 30, { rx: 5 }).color('primary').label('node');
  block('B', 330, 40, 100, 80, { style: 'active', rx: 6 }).label('block');
});
</script>

</body>
</html>

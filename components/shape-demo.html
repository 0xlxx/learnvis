<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shape Demo — learnvis</title>
  <link rel="stylesheet" href="../theme.css">
  <style>
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem;line-height:1.6}
    h1{font-size:1.3rem;margin:0 0 0.3rem}
    .sub{color:var(--text-muted);font-size:0.82rem;margin:0 0 1.5rem}
    .row{display:flex;gap:16px;flex-wrap:wrap}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
    .card h3{font-size:0.75rem;margin:0 0 4px}
    .stage{width:260px;height:200px;display:block}
  </style>
</head>
<body>
<h1>Shape Primitives</h1>
<p class="sub">d3-shape based: symbol, arc, rect, ngon, ellipse</p>
<div class="row" id="grid"></div>

<script src="../dist/learnvis.js"></script>
<script>
const cells = [
  { name: 'symbol · circle', render(s) {
    s.math.symbol('s', [130,100], { type:'circle', size:20, color:'primary', fill:'primary' });
  }},
  { name: 'symbol · star', render(s) {
    s.math.symbol('s', [130,100], { type:'star', size:12, color:'danger', fill:'warning' });
  }},
  { name: 'symbol · diamond', render(s) {
    s.math.symbol('s', [130,100], { type:'diamond', size:16, color:'accent', fill:'accent' });
  }},
  { name: 'symbol · triangle', render(s) {
    s.math.symbol('s', [130,100], { type:'triangle', size:14, color:'success', fill:'success' });
  }},
  { name: 'symbol · cross', render(s) {
    s.math.symbol('s', [130,100], { type:'cross', size:18, color:'info' });
  }},
  { name: 'arc · half donut', render(s) {
    s.math.arc('a', [130,100], { innerR:30, outerR:60, startAngle:0, endAngle:Math.PI, color:'primary', fill:'primary' });
  }},
  { name: 'arc · quarter', render(s) {
    s.math.arc('a', [130,100], { innerR:20, outerR:70, startAngle:0, endAngle:Math.PI/2, color:'danger', fill:'danger' });
  }},
  { name: 'arc · pie slice', render(s) {
    s.math.arc('a', [130,100], { innerR:0, outerR:60, startAngle:Math.PI/4, endAngle:Math.PI*1.5, color:'accent', fill:'accent' });
  }},
  { name: 'rect', render(s) {
    s.math.rect('r', 130, 100, 140, 80).color('info').opacity(0.4);
  }},
  { name: 'ngon · hex', render(s) {
    s.math.ngon('h', 130, 100, 60, 6).color('warning');
  }},
  { name: 'ngon · triangle', render(s) {
    s.math.ngon('t', 130, 100, 50, 3).color('danger');
  }},
  { name: 'ellipse', render(s) {
    s.math.ellipse('e', 130, 100, 90, 50).color('success');
  }},
  { name: 'symbol · wye', render(s) {
    s.math.symbol('s', [130,100], { type:'wye', size:14, color:'muted' });
  }},
  { name: 'arc · full donut', render(s) {
    s.math.arc('a', [130,100], { innerR:40, outerR:60, startAngle:0, endAngle:Math.PI*2, color:'info', fill:'info' });
  }},
  { name: 'symbol · square', render(s) {
    s.math.symbol('s', [130,100], { type:'square', size:24, color:'primary' });
  }},
];

const grid = document.getElementById('grid');
cells.forEach((c, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<h3>${c.name}</h3><div class="stage" id="st${i}"></div>`;
  grid.appendChild(card);

  const s = LearnVis.stage('#st' + i, { width: 260, height: 200, theme: 'paper' });
  s.steps([{ frame: c.render }]);
});
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Graph — Style Candidates</title>
  <link rel="stylesheet" href="../../theme.css">
  <style>
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem;line-height:1.6}
    h1{font-size:1.3rem;margin:0 0 0.3rem}
    .sub{color:var(--text-muted);font-size:0.82rem;margin:0 0 1.5rem}
    section{margin-bottom:2rem}
    section h2{font-size:0.9rem;margin:0 0 6px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center}
    .card .name{font-size:0.7rem;color:var(--text-dim);margin-bottom:4px}
    .card .stage{width:220px;height:180px;display:block}
  </style>
</head>
<body>

<h1>Graph — Style Candidates</h1>
<p class="sub">Edges, vertices, layouts</p>

<div id="sections"></div>

<script type="module">
import { canvas } from 'learnvis';

const sections = [
  {
    name: 'Edge style',
    desc: 'directed / dashed / weighted',
    candidates: [
      { label:'directed', draw(s){
        s.vertex('A', 60, 90); s.vertex('B', 160, 90);
        s.edge('A', 'B');
      }},
      { label:'dashed', draw(s){
        s.vertex('A', 60, 90); s.vertex('B', 160, 90);
        s.edge('A', 'B').dash('5 4');
      }},
      { label:'weighted', draw(s){
        s.vertex('A', 60, 90); s.vertex('B', 160, 90);
        s.edge('A', 'B').stroke(3).label('5');
      }},
      { label:'colored', draw(s){
        s.vertex('A', 60, 90); s.vertex('B', 160, 90);
        s.edge('A', 'B').color('danger').stroke(2);
      }},
    ]
  },
  {
    name: 'Vertex style',
    desc: 'filled / open / numbered / small',
    candidates: [
      { label:'filled', draw(s){
        s.vertex('A', 110, 90);
      }},
      { label:'open', draw(s){
        s.vertex('A', 110, 90).fill('#fff');
      }},
      { label:'numbered', draw(s){
        s.vertex('1', 60, 90); s.vertex('2', 110, 90); s.vertex('3', 160, 90);
      }},
      { label:'small', draw(s){
        s.vertex('a', 70, 90).size(8).label('');
        s.vertex('b', 110, 90).size(8).label('');
        s.vertex('c', 150, 90).size(8).label('');
      }},
    ]
  },
  {
    name: 'Layout',
    desc: 'circular / force / tree / manual',
    candidates: [
      { label:'circular', draw(s){
        const v = [0,1,2,3,4,5].map(i => s.vertex(String(i), 0, 0));
        s.layout('circular', v, [], {center:[110,90],radius:60});
        for (let i = 0; i < 5; i++) s.edge(v[i], v[i+1]);
        s.edge(v[5], v[0]);
      }},
      { label:'force', draw(s){
        const v = [0,1,2,3,4,5].map(i => s.vertex(String(i), Math.random()*160+30, Math.random()*120+30));
        const edges = [];
        for (let i = 0; i < 5; i++) edges.push(s.edge(v[i], v[i+1]));
        edges.push(s.edge(v[5], v[0]));
        edges.push(s.edge(v[1], v[4]));
        s.layout('force', v, edges, {center:[110,90]});
      }},
      { label:'force (tree)', draw(s){
        const r = s.vertex('R', 0, 0);
        const kids = [0,1,2].map(i => s.vertex(String(i), 0, 0));
        const grand = [0,1].map(i => s.vertex('g'+i, 0, 0));
        const all = [r, ...kids, ...grand];
        const edges = [
          s.edge(r, kids[0]), s.edge(r, kids[1]), s.edge(r, kids[2]),
          s.edge(kids[1], grand[0]), s.edge(kids[1], grand[1]),
        ];
        s.layout('force', all, edges, {center:[110,90]});
      }},
      { label:'manual', draw(s){
        s.vertex('A', 50, 120); s.vertex('B', 110, 30); s.vertex('C', 170, 120);
        s.edge('A', 'B'); s.edge('B', 'C'); s.edge('A', 'C');
      }},
    ]
  },
];

const container = document.getElementById('sections');
let stageId = 0;
for (const sec of sections) {
  const el = document.createElement('section');
  el.innerHTML = `<h2>${sec.name}</h2><div class="row" id="r${stageId}"></div>`;
  container.appendChild(el);
  const row = document.getElementById(`r${stageId}`);
  sec.candidates.forEach((c, j) => {
    const id = `st${stageId}_${j}`;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="name">${c.label}</div><div class="stage" id="${id}"></div>`;
    row.appendChild(card);
    const s = canvas(`#${id}`, { width: 220, height: 180, theme: 'warm' });
    s.render(() => c.draw(s));
  });
  stageId++;
}
</script>
</body>
</html>

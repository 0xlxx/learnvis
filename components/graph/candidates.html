<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Graph — Style Candidates</title>
  <link rel="stylesheet" href="../../theme.css">
  <style>
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem;line-height:1.6}
    h1{font-size:1.3rem;margin:0 0 0.3rem}
    .sub{color:var(--text-muted);font-size:0.82rem;margin:0 0 1.5rem}
    section{margin-bottom:2rem}
    section h2{font-size:0.9rem;margin:0 0 6px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center}
    .card .name{font-size:0.7rem;color:var(--text-dim);margin-bottom:4px}
    .card .stage{width:220px;height:180px;display:block}
  </style>
</head>
<body>

<h1>Graph — Style Candidates</h1>
<p class="sub">Edges, vertices, layouts</p>

<div id="sections"></div>

<script type="module">
import { stage } from '../../dist/learnvis.mjs?v=5';

const sections = [
  {
    name: 'Edge style',
    desc: 'undirected / directed / dashed / weighted',
    candidates: [
      { label:'undirected', draw(s){
        const { vertex, edge } = s.graph;
        vertex('A',[60,90]); vertex('B',[160,90]);
        edge('A','B');
      }},
      { label:'directed', draw(s){
        const { vertex, edge } = s.graph;
        vertex('A',[60,90]); vertex('B',[160,90]);
        edge('A','B',{directed:true});
      }},
      { label:'dashed', draw(s){
        const { vertex, edge } = s.graph;
        vertex('A',[60,90]); vertex('B',[160,90]);
        edge('A','B').dashed('5 4');
      }},
      { label:'weighted', draw(s){
        const { vertex, edge } = s.graph;
        vertex('A',[60,90]); vertex('B',[160,90]);
        edge('A','B').strokeW(3).label('5');
      }},
    ]
  },
  {
    name: 'Vertex style',
    desc: 'filled / open / numbered / small',
    candidates: [
      { label:'filled', draw(s){
        const { vertex } = s.graph;
        vertex('A',[110,90]);
      }},
      { label:'open', draw(s){
        const { vertex } = s.graph;
        vertex('A',[110,90]).fill('#fff');
      }},
      { label:'numbered', draw(s){
        const { vertex } = s.graph;
        vertex('1',[60,90]); vertex('2',[110,90]); vertex('3',[160,90]);
      }},
      { label:'small', draw(s){
        const { vertex } = s.graph;
        vertex('a',[70,90]).size(8).label('');
        vertex('b',[110,90]).size(8).label('');
        vertex('c',[150,90]).size(8).label('');
      }},
    ]
  },
  {
    name: 'Layout',
    desc: 'circular / force / tree / manual',
    candidates: [
      { label:'circular', draw(s){
        const { vertex, edge, layout } = s.graph;
        const v = [0,1,2,3,4,5].map(i => vertex(String(i),[0,0]));
        layout('circular', v, [], {center:[110,90],radius:60});
        for (let i = 0; i < 5; i++) edge(v[i], v[i+1]);
        edge(v[5], v[0]);
      }},
      { label:'force', draw(s){
        const { vertex, edge, layout } = s.graph;
        const v = [0,1,2,3,4,5].map(i => vertex(String(i),[Math.random()*160+30,Math.random()*120+30]));
        const edges = [];
        for (let i = 0; i < 5; i++) edges.push({from:v[i], to:v[i+1]});
        edges.push({from:v[5], to:v[0]});
        edges.push({from:v[1], to:v[4]});
        layout('force', v, edges, {center:[110,90]});
        for (const e of edges) edge(e.from, e.to);
      }},
      { label:'force (tree)', draw(s){
        const { vertex, edge, layout } = s.graph;
        const r = vertex('R',[0,0]);
        const kids = [0,1,2].map(i => vertex(String(i),[0,0]));
        const grand = [0,1].map(i => vertex('g'+i,[0,0]));
        const all = [r, ...kids, ...grand];
        const edges = [
          {from:r, to:kids[0]}, {from:r, to:kids[1]}, {from:r, to:kids[2]},
          {from:kids[1], to:grand[0]}, {from:kids[1], to:grand[1]},
        ];
        layout('force', all, edges, {center:[110,90]});
        for (const e of edges) edge(e.from, e.to);
      }},
      { label:'manual', draw(s){
        const { vertex, edge } = s.graph;
        vertex('A',[50,120]); vertex('B',[110,30]); vertex('C',[170,120]);
        edge('A','B'); edge('B','C'); edge('A','C');
      }},
    ]
  },
];

const container = document.getElementById('sections');
let stageId = 0;
for (const sec of sections) {
  const el = document.createElement('section');
  el.innerHTML = `<h2>${sec.name}</h2><div class="row" id="r${stageId}"></div>`;
  container.appendChild(el);
  const row = document.getElementById(`r${stageId}`);
  sec.candidates.forEach((c, j) => {
    const id = `st${stageId}_${j}`;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="name">${c.label}</div><div class="stage" id="${id}"></div>`;
    row.appendChild(card);
    const s = stage(`#${id}`, { width: 220, height: 180, theme: 'warm' });
    c.draw(s);
  });
  stageId++;
}
</script>
</body>
</html>

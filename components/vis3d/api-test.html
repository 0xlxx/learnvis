<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>API test — vis3d</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#111;color:#eee;font-family:system-ui,sans-serif;
       display:flex;flex-direction:column;align-items:center;min-height:100vh}
  h1{font-size:1rem;padding:1rem 0 .3rem}
  .sub{font-size:.72rem;color:#888;margin-bottom:1rem}
  #app{width:780px;height:520px;border-radius:12px;overflow:hidden;
       border:1px solid rgba(255,255,255,.1)}
  footer{width:780px;margin-top:.6rem;font-size:.64rem;color:#666;
          display:flex;justify-content:space-between}
  #gpu{color:#22c55e}
  .pass{color:#22c55e}
  .fail{color:#ef4444}
  .checks{width:780px;margin-bottom:.5rem;font-size:.68rem;
          display:flex;flex-wrap:wrap;gap:.5rem}
  .check{border-radius:4px;padding:.2rem .4rem;
         background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
</style>
</head>
<body>
<h1>API 一致性测试</h1>
<p class="sub"><span id="gpu">checking WebGPU…</span></p>
<div class="checks" id="checks"></div>
<div id="app"></div>
<footer>
  <span><kbd>drag</kbd> 旋转 · <kbd>scroll</kbd> 缩放</span>
  <span id="status"></span>
</footer>

<script type="module">
import { canvas3d } from '@learnvis/vis3d';

if (!navigator.gpu) {
  document.getElementById('gpu').innerHTML = '❌ WebGPU not available — Chrome 113+';
  throw new Error('WebGPU not available');
}
document.getElementById('gpu').innerHTML = '✅ WebGPU';

const checks = document.getElementById('checks');
function check(name, pass) {
  const el = document.createElement('span');
  el.className = 'check ' + (pass ? 'pass' : 'fail');
  el.textContent = (pass ? '✅' : '❌') + ' ' + name;
  checks.appendChild(el);
}

const s = await canvas3d('#app', { theme: 'dark', mood: 'clean' });
document.getElementById('status').textContent = 'ready';

// ── Render loop: static batch + animated entities ──
// Note: 3D render() runs every frame. Fixed-ID entities (point, vector, polygon)
// update in-place. Batch primitives (points, spheres, vectors) auto-generate IDs
// and are recreated each frame — old ones cleaned up by CleanupSystem.
s.render(() => {
  s.frame3d({ extent: 3 });

  // polygon() — renamed from fill
  s.polygon('floor', [[-2,0,-2],[2,0,-2],[2,0,2],[-2,0,2]])
    .color('primary').opacity(0.08);

  // polygon() — triangle
  s.polygon('tri', [[0,1.5,-1],[-1.5,0.5,1],[1.5,0.5,1]])
    .color('danger').opacity(0.15);

  // fill() deprecated alias — still works
  s.fill('legacy', [[-1.5,1,-0.5],[0,1.5,0],[1.5,1,-0.5]])
    .color('info').opacity(0.12);

  // Batch points — array (no opts)
  s.points([
    [-2, 1.2, -1], [-1, 1.2, -1.5], [0, 1.2, -1],
    [1, 1.2, -1.5], [2, 1.2, -1],
  ]).color('accent');

  // Batch points — function (opts required)
  s.points(
    (x, y, z) => [x, y, Math.cos(x * 2) * Math.sin(z * 2) * 0.3],
    { x: [-3, 3], y: [0.8, 0.8], z: [-3, 3], step: 0.5 },
  ).color('warning');

  // Batch spheres — array
  s.spheres([
    [2.5, 0.8, 2.5], [2.5, 0.8, -2.5],
    [-2.5, 0.8, 2.5], [-2.5, 0.8, -2.5],
  ]).color('danger');

  // Batch spheres — function with radius
  s.spheres(
    (x, y, z) => [x, y, Math.sin(x * 1.5) * Math.cos(z * 1.5)],
    { x: [-2, 2], y: [1.5, 1.5], z: [-2, 2], step: 0.8, r: 0.12 },
  ).color('info');

  // Vector field — opts.color now works
  s.vectors(
    (x, y, z) => [z, 0, -x],
    { x: [-2, 2], y: [0.6, 0.6], z: [-2, 2], step: 1, color: 'warning' },
  );

  // ── Animated entities ──
  const t = performance.now() * 0.001;
  const r = 2.5;
  s.point('orbit', r * Math.cos(t * 0.7), 0.6, r * Math.sin(t * 0.7))
    .color('danger').size('large');
  s.vector('spin', [0, 0.6, 0], [Math.cos(t), 1.2, Math.sin(t)])
    .color('warning').thickness('bold');
});

check('polygon()', true);
check('fill() alias', true);
check('points(arr) — no opts', true);
check('points(fn, opts) — opts required', true);
check('spheres(arr)', true);
check('spheres(fn, opts)', true);
check('vectors(fn, opts)', true);
check('animation (point+vector)', true);

console.log('✅ API consistency test ready');
</script>
</body>
</html>

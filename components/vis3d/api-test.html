<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>API test — vis3d</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#111;color:#eee;font-family:system-ui,sans-serif;
       display:flex;flex-direction:column;align-items:center;min-height:100vh}
  h1{font-size:1rem;padding:1rem 0 .3rem}
  .sub{font-size:.72rem;color:#888;margin-bottom:1rem}
  #app{width:780px;height:520px;border-radius:12px;overflow:hidden;
       border:1px solid rgba(255,255,255,.1)}
  footer{width:780px;margin-top:.6rem;font-size:.64rem;color:#666;
          display:flex;justify-content:space-between}
  #gpu{color:#22c55e}
  .pass{color:#22c55e}
  .fail{color:#ef4444}
  .checks{width:780px;margin-bottom:.5rem;font-size:.68rem;
          display:flex;flex-wrap:wrap;gap:.5rem}
  .check{border-radius:4px;padding:.2rem .4rem;
         background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08)}
</style>
</head>
<body>
<h1>API 一致性测试</h1>
<p class="sub"><span id="gpu">checking WebGPU…</span></p>
<div class="checks" id="checks"></div>
<div id="app"></div>
<footer>
  <span><kbd>drag</kbd> 旋转 · <kbd>scroll</kbd> 缩放</span>
  <span id="status"></span>
</footer>

<script type="module">
import { canvas3d } from '@learnvis/vis3d';

if (!navigator.gpu) {
  document.getElementById('gpu').innerHTML = '❌ WebGPU not available — Chrome 113+';
  throw new Error('WebGPU not available');
}
document.getElementById('gpu').innerHTML = '✅ WebGPU';

const checks = document.getElementById('checks');
function check(name, pass) {
  const el = document.createElement('span');
  el.className = 'check ' + (pass ? 'pass' : 'fail');
  el.textContent = (pass ? '✅' : '❌') + ' ' + name;
  checks.appendChild(el);
}

const s = await canvas3d('#app', { theme: 'dark', mood: 'clean' });
document.getElementById('status').textContent = 'ready';

s.render(() => {
  s.frame3d({ extent: 3 });

  // polygon() — renamed from fill
  s.polygon('floor', [[-2.5,0,-2.5],[2.5,0,-2.5],[2.5,0,2.5],[-2.5,0,2.5]])
    .color('primary').opacity(0.06);

  // fill() — deprecated alias, still works
  s.fill('triangle', [[0,2,0],[-1.5,0.5,1],[1.5,0.5,1]])
    .color('danger').opacity(0.12);

  // points() — array form, no opts
  s.points([
    [2, 0.3, 2], [2, 0.3, -2], [-2, 0.3, 2], [-2, 0.3, -2],
  ]).color('accent');

  // spheres() — array form, no opts
  s.spheres([
    [2.5, 0.5, 2.5], [2.5, 0.5, -2.5],
    [-2.5, 0.5, 2.5], [-2.5, 0.5, -2.5],
  ]).color('danger');

  // vectors() — opts required, color opt works
  s.vectors(
    (x, y, z) => [z, 0, -x],
    { x: [-2, 2], y: [0.2, 0.2], z: [-2, 2], step: 1, color: 'info' },
  );

  // ── cos(1.5x) — curve drawing animation ──
  const ct = performance.now() * 0.001;
  const xEnd = ((ct * 0.4) % 6) - 3; // cycles [-3, 3]
  s.curve(
    t => [t, Math.cos(t * 1.5) * 0.8 + 0.6, 0],
    { t: [-3, xEnd], segments: Math.max(2, Math.floor((xEnd + 3) / 6 * 200)) },
  ).color('warning').thickness('bold');
});

check('polygon() — renamed from fill', true);
check('fill() — deprecated alias', true);
check('points(arr) — no opts needed', true);
check('spheres(arr) — no opts needed', true);
check('vectors(fn, opts) — color opt works', true);
check('cos curve draw animation', true);

console.log('✅ API consistency test ready');
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coordinate Systems — learnvis</title>
  <link rel="stylesheet" href="../../theme.css">
  <style>
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem;line-height:1.6}
    h1{font-size:1.3rem;margin:0 0 0.3rem}
    .sub{color:var(--text-muted);font-size:0.82rem;margin:0 0 1.5rem}
    section{margin-bottom:2rem}
    section h2{font-size:0.9rem;margin:0 0 6px}
    .desc{font-size:0.72rem;color:var(--text-muted);margin-bottom:10px}
    .row{display:flex;gap:16px;flex-wrap:wrap}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
    .card .name{font-size:0.72rem;font-weight:600;margin-bottom:4px}
    .card .stage{display:block}
    .lv-stepper-host{margin-top:6px}
  </style>
</head>
<body>

<h1>Coordinate Systems</h1>
<p class="sub">coords() · basis · aspect · axes · grid</p>

<div id="sections"></div>

<script type="module">
import { canvas, stepper } from 'learnvis';

const sections = [
  // ═══ 1. coords() — explicit axes + grid ═══
  {
    name: 'coords() — Explicit Axes & Grid',
    desc: 'coords() declares projection. axes(), grid(), origin() are explicit calls — no hidden side effects. axes() returns Gfx for chaining.',
    width: 340, height: 260,
    setup(s) {
      s.render(() => {
        const vp = s.coords({ x: [-5, 5], y: [-4, 4] });
        vp.axes().color('dim').stroke(1.2);
        vp.grid();
        vp.origin();
        vp.vector('v', [0, 0], [3, 1]).color('danger').label('v').stroke(2);
        vp.circle('c', 0, 0, 2).color('accent').opacity(0.2);
        vp.point('P', 3, 1).color('danger').label('P').size(5);
      });
    },
  },

  // ═══ 2. aspect: 'equal' ═══
  {
    name: 'aspect: equal — Square Pixels',
    desc: 'aspect: "equal" forces 1:1 pixel ratio. Circles stay circles, squares stay squares.',
    width: 340, height: 260,
    setup(s) {
      s.render(() => {
        const vp = s.coords({ x: [-4, 4], y: [-3, 3], aspect: 'equal' });
        vp.axes();
        vp.grid();
        vp.circle('c', 0, 0, 2.5).color('accent').stroke(1.5).opacity(0.25);
        vp.point('A', 2, 2).color('danger').label('(2,2)').size(4);
        vp.point('B', 2, -2).color('info').label('(2,−2)').size(4);
        vp.vector('v', [0, 0], [2, 2]).color('danger').stroke(1.4);
        vp.vector('w', [0, 0], [2, -2]).color('info').stroke(1.4);
      });
    },
  },

  // ═══ 3. basis transform ═══
  {
    name: 'basis Transform — Animated',
    desc: 'Smooth transition: standard → shear → rotate. Grid, axes, basis arrows all follow.',
    width: 340, height: 260,
    setup(s) {
      const lerp = (a, b, t) => [
        [a[0][0] + (b[0][0] - a[0][0]) * t, a[0][1] + (b[0][1] - a[0][1]) * t],
        [a[1][0] + (b[1][0] - a[1][0]) * t, a[1][1] + (b[1][1] - a[1][1]) * t],
      ];
      const I = [[1, 0], [0, 1]];
      const shear = [[2, 0], [1, 1]];
      const rot = [[1, 1], [-1, 1]];
      const keyframes = [I, shear, I, rot, I];
      const stepsPerSegment = 8;
      const frames = [];
      for (let s = 0; s < keyframes.length - 1; s++) {
        for (let i = 0; i < stepsPerSegment; i++) {
          const t = i / stepsPerSegment;
          frames.push(lerp(keyframes[s], keyframes[s + 1], t));
        }
      }
      frames.push(keyframes[keyframes.length - 1]);
      return s.steps(frames.map((basis) => ({
        frame(s) {
          const eq = Math.abs(basis[0][0] - 1) < 0.01 && Math.abs(basis[0][1]) < 0.01
            && Math.abs(basis[1][0]) < 0.01 && Math.abs(basis[1][1] - 1) < 0.01;
        const vp = s.coords({ x: [-3, 3], y: [-3, 3], aspect: 'equal', basis: eq ? undefined : basis });
        vp.axes();
        vp.grid();
        // Basis vectors — auto-rotate with coords projection
        vp.vector('i', [0, 0], [1.5, 0]).color('danger').label('î').stroke(2);
        vp.vector('j', [0, 0], [0, 1.5]).color('accent').label('ĵ').stroke(2);
        vp.vector('v', [0, 0], [1, 1]).color('primary').stroke(2).label('(1,1)');
          vp.point('P', 1, 1).color('primary').size(5);
        }
      })), { controls: false });
    },
  },

  // ═══ 4. basis side-by-side ═══
  {
    name: 'basis — Standard → Transformed',
    desc: 'Same math vector (1,1) in two different bases. Left: [[1,0],[0,1]]. Right: [[2,0],[1,1]].',
    width: 340, height: 260,
    setup(s) {
      return s.steps([
        { frame(s) {
          const vp = s.coords({ x: [-3, 3], y: [-3, 3], aspect: 'equal' });
          vp.axes(); vp.grid();
          vp.vector('i', [0, 0], [1.3, 0]).color('danger').label('î').stroke(1.5);
          vp.vector('j', [0, 0], [0, 1.3]).color('accent').label('ĵ').stroke(1.5);
          vp.vector('v', [0, 0], [1, 1]).color('warning').stroke(2.5).label('(1,1)');
          vp.point('P', 1, 1).color('primary').size(5);
        }},
        { frame(s) {
          const vp = s.coords({ x: [-3, 3], y: [-3, 3], aspect: 'equal', basis: [[2, 0], [1, 1]] });
          vp.axes(); vp.grid();
          vp.vector('i', [0, 0], [1.3, 0]).color('danger').label('î').stroke(1.5);
          vp.vector('j', [0, 0], [0, 1.3]).color('accent').label('ĵ').stroke(1.5);
          vp.vector('v', [0, 0], [1, 1]).color('warning').stroke(2.5).label('(1,1)');
          vp.point('P', 1, 1).color('primary').size(5);
        }},
      ], { controls: false });
    },
  },

  // ═══ 5. axis labels ═══
  {
    name: 'axes() — Labels + Curve',
    desc: 'coords() with axis labels. sin(x) plot with chained axes styling.',
    width: 380, height: 260,
    setup(s) {
      s.render(() => {
        const vp = s.coords({ x: [-1, 2 * Math.PI + 1], y: [-2, 2], nice: true });
        vp.axes({ xLabel: 'x', yLabel: 'sin(x)' }).stroke(1.2);
        vp.grid();
        vp.curve('sin', x => Math.sin(x)).color('danger').stroke(2);
      });
    },
  },

  // ═══ 6. Grid customization ═══
  {
    name: 'Arrows & Dashed Grid',
    desc: 'Custom grid with dash pattern. Chained axes with .color() and .stroke().',
    width: 340, height: 260,
    setup(s) {
      s.render(() => {
        const vp = s.coords({ x: [-4, 4], y: [-3, 3] });
        vp.axes().stroke(1.2);
        vp.grid({ dash: '4,4' });
        vp.origin();
        vp.vector('v', [0, 0], [3, 2]).color('danger').stroke(2).label('v');
        vp.vector('w', [0, 0], [-2, 2]).color('accent').stroke(2).label('w');
      });
    },
  },

  // ═══ 7. Centered coords ═══
  {
    name: 'coords() — Centered, Explicit',
    desc: 'coords() with chained axes styling + dashed grid. axes() returns Gfx.',
    width: 340, height: 260,
    setup(s) {
      s.render(() => {
        const vp = s.coords({ x: [-3, 3], y: [-2, 2], margin: 0.1, aspect: 'equal' });
        vp.axes().color('dim');
        vp.grid({ dash: '2,4', color: 'dim' });
        vp.origin({ color: 'primary', label: 'O' });
        vp.vector('u', [0, 0], [2, 1]).color('danger').stroke(2).label('u');
        vp.circle('c', 0, 0, 1.5).color('accent').opacity(0.2);
      });
    },
  },

  // ═══ 8. nice rounding ═══
  {
    name: 'nice — Domain Rounding',
    desc: 'coords with nice:true rounds x:[-4.7,4.3] → [-5,5], y:[-2.8,3.1] → [-3,4]. Cleaner tick labels.',
    width: 340, height: 260,
    setup(s) {
      s.render(() => {
        const vp = s.coords({ x: [-4.7, 4.3], y: [-2.8, 3.1], nice: true });
        vp.axes();
        vp.grid();
        vp.vector('v', [0, 0], [3, 2]).color('danger').stroke(2).label('v');
      });
    },
  },
];

const container = document.getElementById('sections');
for (const sec of sections) {
  const el = document.createElement('section');
  const stageId = 'st' + Math.random().toString(36).slice(2, 8);
  el.innerHTML = `<h2>${sec.name}</h2><div class="desc">${sec.desc}</div><div class="row"><div class="card"><div class="stage" id="${stageId}" style="width:${sec.width}px;height:${sec.height}px"></div><div class="lv-stepper-host"></div></div></div>`;
  container.appendChild(el);
  const s = canvas('#' + stageId, { width: sec.width, height: sec.height, theme: 'warm' });
  const result = sec.setup(s);
  if (result && typeof result.go === 'function') {
    const host = el.querySelector('.lv-stepper-host');
    if (host) stepper(host, result);
  }
}
</script>
</body>
</html>

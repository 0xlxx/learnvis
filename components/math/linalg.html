<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Linear Algebra — learnvis</title>
  <link rel="stylesheet" href="../../theme.css">
  <style>
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem;line-height:1.6}
    h1{font-size:1.3rem;margin:0 0 0.3rem}
    .sub{color:var(--text-muted);font-size:0.82rem;margin:0 0 1.5rem}
    section{margin-bottom:2rem}
    section h2{font-size:0.9rem;margin:0 0 6px}
    .desc{font-size:0.72rem;color:var(--text-muted);margin-bottom:8px}
    .row{display:flex;gap:16px;flex-wrap:wrap}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
    .card .stage{display:block}
    .lv-stepper-host{margin-top:4px}
  </style>
</head>
<body>

<h1>Linear Algebra — viewport</h1>
<p class="sub">Natural math coordinates · auto-axes · margin protection · smooth transforms</p>

<div id="sections"></div>

<script type="module">
import { stage } from '../../dist/learnvis.mjs?v=4';

const sections = [
  // ── Static: matrix display ──
  {
    name: 'Matrix Display',
    desc: 'matrix() in viewport. Natural placement, bracket rendering.',
    width: 340, height: 200,
    setup(s) {
      const { viewport, matrix } = s.math;
      s.render(() => {
        const vp = viewport({ x: [-4, 4], y: [-3, 3], margin: 0.1 });
        matrix('A', [[1, 2], [3, 4]], { x: -2, y: 1 }).color('primary').label('A');
        matrix('I', [[1, 0], [0, 1]], { x: 1.5, y: 1 }).color('dim').label('I');
      });
    },
  },
  {
    name: 'Basis Vectors',
    desc: 'î (accent) + ĵ (danger) at origin. basis() is sugar over vector().',
    width: 340, height: 260,
    setup(s) {
      s.render(() => {
        const vp = s.math.viewport({ x: [-4, 4], y: [-3, 3] });
        vp.basis('std', [0, 0], { scale: 2.5 });
      });
    },
  },

  // ── Animation: vector × matrix ──
  {
    name: 'Vector × Matrix Transform',
    desc: 'v = (3,0). Apply 90° rotation → shear → reflect. viewport margin prevents overflow.',
    width: 400, height: 300,
    setup(s) {
      s.steps([
        { label: 'v = (3,0)', frame(sv) {
          const vp = sv.math.viewport({ x: [-5, 5], y: [-4, 4] });
          vp.vector('v', [0, 0], [3, 0]).color('danger').label('v').strokeW(2);
        }},
        { label: 'rot 90°', frame(sv) {
          const vp = sv.math.viewport({ x: [-5, 5], y: [-4, 4] });
          vp.vector('v', [0, 0], [3, 0]).color('danger').label('v').strokeW(2)
            .matrixTransform(0, 1, -1, 0);
        }},
        { label: 'shear', frame(sv) {
          const vp = sv.math.viewport({ x: [-5, 5], y: [-4, 4] });
          vp.vector('v', [0, 0], [3, 0]).color('danger').label('v').strokeW(2)
            .matrixTransform(1, 0.5, 0.5, 1);
        }},
        { label: 'reflect', frame(sv) {
          const vp = sv.math.viewport({ x: [-5, 5], y: [-4, 4] });
          vp.vector('v', [0, 0], [3, 0]).color('danger').label('v').strokeW(2)
            .matrixTransform(1, 0, 0, -1);
        }},
      ], { controls: true });
    },
  },
  {
    name: 'Determinant — Unit Square',
    desc: '[[2,0.5],[0.5,1.5]]. det≈2.75. Area scales by |det|.',
    width: 400, height: 300,
    setup(s) {
      s.steps([
        { label: 'Unit square', frame(sv) {
          const vp = sv.math.viewport({ x: [-4, 4], y: [-3, 3] });
          vp.polygon('sq', [[0,0],[1,0],[1,-1],[0,-1]]).color('accent').opacity(0.5).label('det=1');
        }},
        { label: 'T(square)', frame(sv) {
          const vp = sv.math.viewport({ x: [-4, 4], y: [-3, 3] });
          vp.polygon('sq', [[0,0],[1,0],[1,-1],[0,-1]]).color('danger').opacity(0.5).label('det≈2.75')
            .matrixTransform(2, 0.5, 0.5, 1.5);
        }},
      ], { controls: true });
    },
  },
  {
    name: 'Eigenvectors — [[2,1],[1,2]]',
    desc: 'λ₁=3 on (1,1), λ₂=1 on (1,-1). Eigenvectors stay on their span.',
    width: 400, height: 300,
    setup(s) {
      s.steps([
        { label: 'Basis + evecs', frame(sv) {
          const vp = sv.math.viewport({ x: [-5, 5], y: [-4, 4] });
          // Standard basis
          vp.vector('e1', [0, 0], [1, 0]).color('accent').label('e₁').strokeW(1.5);
          vp.vector('e2', [0, 0], [0, 1]).color('info').label('e₂').strokeW(1.5);
          // Eigenvector (1,1)
          vp.vector('v1', [0, 0], [0.7, 0.7]).color('warning').label('v₁').strokeW(2.5).dashed('5 3');
          // Eigenvector (1,-1)
          vp.vector('v2', [0, 0], [0.7, -0.7]).color('success').label('v₂').strokeW(2.5).dashed('5 3');
        }},
        { label: 'T applied', frame(sv) {
          const vp = sv.math.viewport({ x: [-5, 5], y: [-4, 4] });
          vp.vector('e1', [0, 0], [1, 0]).color('accent').label('e₁').strokeW(1.5)
            .matrixTransform(2, 1, 1, 2);
          vp.vector('e2', [0, 0], [0, 1]).color('info').label('e₂').strokeW(1.5)
            .matrixTransform(2, 1, 1, 2);
          // v₁=(1,1) → scaled by λ=3 → (3,3)
          vp.vector('v1', [0, 0], [0.7, 0.7]).color('warning').label('3·v₁').strokeW(2.5)
            .matrixTransform(2, 1, 1, 2);
          // v₂=(1,-1) → scaled by λ=1 → unchanged direction
          vp.vector('v2', [0, 0], [0.7, -0.7]).color('success').label('1·v₂').strokeW(2.5)
            .matrixTransform(2, 1, 1, 2);
        }},
      ], { controls: true });
    },
  },
  {
    name: 'Basis Rotation 0°→135°',
    desc: 'î, ĵ rotate via .rotate() (built-in). viewport keeps origin centered.',
    width: 400, height: 300,
    setup(s) {
      const degs = [0, 30, 60, 90, 135];
      s.steps(
        degs.map(d => ({
          label: `${d}°`,
          frame(sv) {
            const vp = sv.math.viewport({ x: [-4, 4], y: [-3, 3] });
            vp.vector('i', [0, 0], [2.5, 0]).color('danger').label('î').strokeW(2)
              .rotate(d, 0, 0);
            vp.vector('j', [0, 0], [0, 2.5]).color('info').label('ĵ').strokeW(2)
              .rotate(d, 0, 0);
          }
        })),
        { controls: true }
      );
    },
  },
];

const container = document.getElementById('sections');
for (const [si, sec] of sections.entries()) {
  const el = document.createElement('section');
  const sizeAttr = `width:${sec.width}px;height:${sec.height}px`;
  el.innerHTML = `<h2>${sec.name}</h2><div class="desc">${sec.desc}</div><div class="card"><div class="stage" id="st${si}" style="${sizeAttr}"></div></div>`;
  container.appendChild(el);
  const s = stage(`#st${si}`, { width: sec.width, height: sec.height, theme: 'warm' });
  sec.setup(s);
}
</script>
</body>
</html>

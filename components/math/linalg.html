<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Linear Algebra — learnvis</title>
  <link rel="stylesheet" href="../../theme.css">
  <style>
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem;line-height:1.6}
    h1{font-size:1.3rem;margin:0 0 0.3rem}
    .sub{color:var(--text-muted);font-size:0.82rem;margin:0 0 1.5rem}
    section{margin-bottom:2rem}
    section h2{font-size:0.9rem;margin:0 0 6px}
    .desc{font-size:0.72rem;color:var(--text-muted);margin-bottom:8px}
    .row{display:flex;gap:16px;flex-wrap:wrap}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
    .card .stage{display:block}
    .lv-stepper-host .step-controls{display:flex;gap:4px;margin-top:4px;justify-content:center;align-items:center}
    .lv-stepper-host button{font-size:0.65rem;padding:2px 8px;border:1px solid var(--border);border-radius:4px;background:var(--card);cursor:pointer}
    .lv-stepper-host button:disabled{opacity:0.35;cursor:default}
    .lv-stepper-host .step-label{font-size:0.65rem;color:var(--text-dim);min-width:70px}
  </style>
</head>
<body>

<h1>Linear Algebra — Primitives</h1>
<p class="sub">matrix display · basis vectors · matrixTransform · determinant · eigenvalue animation</p>

<div id="sections"></div>

<script type="module">
import { stage } from '../../dist/learnvis.mjs?v=3';

const sections = [
  // ── Static displays ──
  {
    name: 'Matrix Display — Identity & Shear',
    desc: 'matrix() renders [[a,b],[c,d]] with bracket glyphs and monospace font.',
    width: 400, height: 160,
    setup(s) {
      const { matrix } = s.math;
      s.render(() => {
        matrix('I', [[1, 0], [0, 1]], { x: 20, y: 40 }).color('dim').label('I');
        matrix('S', [[1, 0.8], [0.4, 1]], { x: 220, y: 40 }).color('accent').label('Shear');
      });
    },
  },
  {
    name: 'Matrix — set() update',
    desc: 'Chain .set([[new]]) to update values. Here 3×2 matrix.',
    width: 340, height: 160,
    setup(s) {
      const { matrix } = s.math;
      s.render(() => {
        matrix('A', [[2, -1], [0, 3], [1, 0]], { x: 100, y: 10 })
          .color('primary').label('3×2 matrix');
      });
    },
  },
  {
    name: 'Basis Vectors — Standard',
    desc: 'î (accent) + ĵ (danger), arrow markers, hat labels. basis() is sugar over vector().',
    width: 320, height: 240,
    setup(s) {
      const { basis, point } = s.math;
      s.render(() => {
        point('O', [150, 150]).color('primary').label('O').size(5);
        basis('std', [150, 150], { scale: 80 });
      });
    },
  },
  {
    name: 'Basis — Custom',
    desc: '.iColor("info") .jColor("warning") .scale(100).strokeW(2.5)',
    width: 320, height: 240,
    setup(s) {
      const { basis, point } = s.math;
      s.render(() => {
        point('O', [160, 140]).color('primary').label('O').size(5);
        basis('B', [160, 140], { scale: 100, iColor: 'info', jColor: 'warning', strokeW: 2.5 });
      });
    },
  },

  // ── Animation demos ──
  {
    name: 'Vector × Matrix — Step Animation',
    desc: 'v = (200,0). Apply 90° rotation → shear. Smooth D3 interpolation.',
    width: 380, height: 260,
    setup(s) {
      s.steps([
        { label: '原始 v', frame(sv) {
          const { axes, point, vector } = sv.math;
          axes('ax', [60, 220], { xLen: 300, yLen: 180, xLabel: 'x', yLabel: 'y', color: 'dim' });
          point('O', [60, 220]).color('primary').label('O');
          vector('v', [60, 220], [260, 220]).color('danger').label('v').strokeW(2);
        }},
        { label: 'rot 90°', frame(sv) {
          const { axes, point, vector } = sv.math;
          axes('ax', [60, 220], { xLen: 300, yLen: 180, xLabel: 'x', yLabel: 'y', color: 'dim' });
          point('O', [60, 220]).color('primary').label('O');
          vector('v', [60, 220], [260, 220]).color('danger').label('v').strokeW(2)
            .matrixTransform(0, 1, -1, 0);
        }},
        { label: 'shear', frame(sv) {
          const { axes, point, vector } = sv.math;
          axes('ax', [60, 220], { xLen: 300, yLen: 180, xLabel: 'x', yLabel: 'y', color: 'dim' });
          point('O', [60, 220]).color('primary').label('O');
          vector('v', [60, 220], [260, 220]).color('danger').label('v').strokeW(2)
            .matrixTransform(1, 0.5, 0.5, 1);
        }},
        { label: 'reflect x', frame(sv) {
          const { axes, point, vector } = sv.math;
          axes('ax', [60, 220], { xLen: 300, yLen: 180, xLabel: 'x', yLabel: 'y', color: 'dim' });
          point('O', [60, 220]).color('primary').label('O');
          vector('v', [60, 220], [260, 220]).color('danger').label('v').strokeW(2)
            .matrixTransform(1, 0, 0, -1);
        }},
      ], { controls: true });
    },
  },
  {
    name: 'Determinant — Unit Square Transformed',
    desc: '[[2,0.5],[0.5,1.5]]. det ≈ 2.75. Area scales by |det|.',
    width: 380, height: 260,
    setup(s) {
      const ax = 30, ay = 220, sz = 70;
      s.steps([
        { label: '单位正方形', frame(sv) {
          const { axes, point, polygon } = sv.math;
          axes('ax', [ax, ay], { xLen: 300, yLen: 180, xLabel: 'x', yLabel: 'y', color: 'dim' });
          point('O', [ax, ay]).color('primary').label('O');
          const sq = [[0,0],[sz,0],[sz,-sz],[0,-sz]].map(([x,y]) => [ax+x, ay+y]);
          polygon('sq', sq).color('accent').opacity(0.5).label('det = 1');
        }},
        { label: 'T(square)', frame(sv) {
          const { axes, point, polygon } = sv.math;
          axes('ax', [ax, ay], { xLen: 300, yLen: 180, xLabel: 'x', yLabel: 'y', color: 'dim' });
          point('O', [ax, ay]).color('primary').label('O');
          const sq = [[0,0],[sz,0],[sz,-sz],[0,-sz]].map(([x,y]) => [ax+x, ay+y]);
          polygon('sq', sq).color('danger').opacity(0.5).label('det ≈ 2.75')
            .matrixTransform(2, 0.5, 0.5, 1.5);
        }},
      ], { controls: true });
    },
  },
  {
    name: 'Eigen — Rotation + Scale',
    desc: '[[2,1],[1,2]]. λ₁=3 ↖↗, λ₂=1 ↙↘. Eigenvectors stay on their span.',
    width: 380, height: 260,
    setup(s) {
      const ax = 30, ay = 220;
      // Matrix [[2,1],[1,2]] — eigenvectors: (1,1) with λ=3, (1,-1) with λ=1
      s.steps([
        { label: '原始基', frame(sv) {
          const { axes, point, vector } = sv.math;
          axes('ax', [ax, ay], { xLen: 300, yLen: 180, xLabel: 'x', yLabel: 'y', color: 'dim' });
          point('O', [ax, ay]).color('primary').label('O');
          vector('e1', [ax, ay], [ax+60, ay]).color('accent').label('e1').strokeW(2);
          vector('e2', [ax, ay], [ax, ay-60]).color('info').label('e2').strokeW(2);
          // eigenvector (1,1)
          vector('v1', [ax, ay], [ax+45, ay-45]).color('warning').label('v1').strokeW(2.5).dashed('5 3');
          // eigenvector (1,-1)
          vector('v2', [ax, ay], [ax+45, ay+45]).color('success').label('v2').strokeW(2.5).dashed('5 3');
        }},
        { label: 'T = [[2,1],[1,2]]', frame(sv) {
          const { axes, point, vector } = sv.math;
          axes('ax', [ax, ay], { xLen: 300, yLen: 180, xLabel: 'x', yLabel: 'y', color: 'dim' });
          point('O', [ax, ay]).color('primary').label('O');
          vector('e1', [ax, ay], [ax+60, ay]).color('accent').label('e1').strokeW(2)
            .matrixTransform(2, 1, 1, 2);
          vector('e2', [ax, ay], [ax, ay-60]).color('info').label('e2').strokeW(2)
            .matrixTransform(2, 1, 1, 2);
          // v1=(1,1) scaled by λ=3
          vector('v1', [ax, ay], [ax+45, ay-45]).color('warning').label('3·v1').strokeW(2.5)
            .matrixTransform(2, 1, 1, 2);
          // v2=(1,-1) scaled by λ=1 (unchanged direction)
          vector('v2', [ax, ay], [ax+45, ay+45]).color('success').label('1·v2').strokeW(2.5)
            .matrixTransform(2, 1, 1, 2);
        }},
      ], { controls: true });
    },
  },
  {
    name: 'Basis Rotation — Step by Step',
    desc: 'î, ĵ rotate 0°→45°→90°→135° via .rotate() (built-in transform).',
    width: 400, height: 260,
    setup(s) {
      const degs = [0, 30, 60, 90, 135];
      s.steps(
        degs.map(d => ({
          label: `${d}°`,
          frame(sv) {
            const { point, vector } = sv.math;
            const O = [70, 200];
            point('O', O).color('primary').label('O').size(5);
            vector('i', O, [O[0]+70, O[1]]).color('danger').label('î').strokeW(2)
              .rotate(d, O[0], O[1]);
            vector('j', O, [O[0], O[1]-70]).color('info').label('ĵ').strokeW(2)
              .rotate(d, O[0], O[1]);
          }
        })),
        { controls: true }
      );
    },
  },
];

const container = document.getElementById('sections');
for (const [si, sec] of sections.entries()) {
  const el = document.createElement('section');
  const sizeAttr = `width:${sec.width}px;height:${sec.height}px`;
  el.innerHTML = `<h2>${sec.name}</h2><div class="desc">${sec.desc}</div><div class="card"><div class="stage" id="st${si}" style="${sizeAttr}"></div></div>`;
  container.appendChild(el);
  const s = stage(`#st${si}`, { width: sec.width, height: sec.height, theme: 'warm' });
  sec.setup(s);
}
</script>
</body>
</html>

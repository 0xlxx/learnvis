<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Linear Algebra — learnvis</title>
  <link rel="stylesheet" href="../../theme.css">
  <style>
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem;line-height:1.6}
    h1{font-size:1.3rem;margin:0 0 0.3rem}
    .sub{color:var(--text-muted);font-size:0.82rem;margin:0 0 1.5rem}
    section{margin-bottom:2rem}
    section h2{font-size:0.9rem;margin:0 0 6px}
    .desc{font-size:0.72rem;color:var(--text-muted);margin-bottom:8px}
    .row{display:flex;gap:16px;flex-wrap:wrap}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
    .card .stage{display:block}
    .lv-stepper-host .step-controls{display:flex;gap:4px;justify-content:center;align-items:center}
    .lv-stepper-host button{font-size:0.7rem;padding:2px 10px;border:1px solid var(--border);border-radius:4px;background:var(--card);cursor:pointer}
    .lv-stepper-host button:disabled{opacity:0.35;cursor:default}
    .lv-stepper-host .step-label{font-size:0.68rem;color:var(--text-dim);min-width:80px}
  </style>
</head>
<body>

<h1>Linear Algebra — Primitives</h1>
<p class="sub">matrix display, basis vectors, matrixTransform animation, determinant</p>

<div id="sections"></div>

<script type="module">
import { stage } from '../../dist/learnvis.mjs';

const sections = [
  {
    name: 'Matrix Display',
    desc: '2×2 matrix with bracket rendering. color(), label(), set().',
    width: 300, height: 180,
    setup(s) {
      const { matrix } = s.math;
      s.render(() => {
        matrix('A', [[1, 2], [3, 4]], { x: 110, y: 50 })
          .color('primary').label('A = [[1,2],[3,4]]');
      });
    },
  },
  {
    name: 'Matrix — Row/Column Picture',
    desc: 'Two matrices side by side: identity and shear.',
    width: 380, height: 180,
    setup(s) {
      const { matrix, axes } = s.math;
      s.render(() => {
        matrix('I', [[1, 0], [0, 1]], { x: 30, y: 50 }).color('dim').label('I (identity)');
        matrix('S', [[1, 0.8], [0.4, 1]], { x: 200, y: 50 }).color('accent').label('Shear');
      });
    },
  },
  {
    name: 'Basis Vectors',
    desc: 'î (accent/red) and ĵ (danger/blue), auto-labeled with hat notation.',
    width: 300, height: 240,
    setup(s) {
      const { basis, point } = s.math;
      s.render(() => {
        point('O', [150, 150]).color('primary').label('O').size(5);
        basis('std', [150, 150], { scale: 80 });
      });
    },
  },
  {
    name: 'Basis — Custom Colors & Scale',
    desc: 'iColor: accent, jColor: info, scale: 60.',
    width: 300, height: 240,
    setup(s) {
      const { basis, point } = s.math;
      s.render(() => {
        point('O', [150, 150]).color('primary').label('O').size(5);
        basis('B', [150, 150], { scale: 60, iColor: 'accent', jColor: 'info' });
      });
    },
  },
  {
    name: 'Matrix Transform — Vector Rotation',
    desc: 'Rotate a vector by 90° using matrixTransform().',
    width: 340, height: 260,
    setup(s) {
      const { axes, point, vector } = s.math;
      s.steps([
        { label: '原始', frame(sv) {
          const { axes, point, vector } = sv.math;
          axes('ax', [60, 220], { xLen: 260, yLen: 180, xLabel: 'x', yLabel: 'y', color: 'dim' });
          point('O', [60, 220]).color('primary').label('O');
          vector('v', [60, 220], [260, 220]).color('danger').label('v').strokeW(2);
        }},
        { label: '90°', frame(sv) {
          const { axes, point, vector } = sv.math;
          axes('ax', [60, 220], { xLen: 260, yLen: 180, xLabel: 'x', yLabel: 'y', color: 'dim' });
          point('O', [60, 220]).color('primary').label('O');
          vector('v', [60, 220], [260, 220]).color('danger').label('v').strokeW(2)
            .matrixTransform(0, 1, -1, 0);  // 90° rotation matrix
        }},
        { label: 'shear', frame(sv) {
          const { axes, point, vector } = sv.math;
          axes('ax', [60, 220], { xLen: 260, yLen: 180, xLabel: 'x', yLabel: 'y', color: 'dim' });
          point('O', [60, 220]).color('primary').label('O');
          vector('v', [60, 220], [260, 220]).color('danger').label('v').strokeW(2)
            .matrixTransform(1, 0.5, 0.5, 1);  // shear
        }},
      ], { controls: true });
    },
  },
  {
    name: 'Determinant — Unit Square',
    desc: 'Unit square transformed by [[2,0.5],[0.5,1.5]]. Area scales by det ≈ 2.75.',
    width: 340, height: 260,
    setup(s) {
      const { axes, point, polygon } = s.math;
      const cx = 170, cy = 150;
      s.steps([
        { label: '单位正方形', frame(sv) {
          const { axes, point, polygon } = sv.math;
          axes('ax', [30, 220], { xLen: 280, yLen: 180, xLabel: 'x', yLabel: 'y', color: 'dim' });
          point('O', [30, 220]).color('primary').label('O');
          const unit = [[0,0],[60,0],[60,-60],[0,-60]].map(([x,y]) => [30+x, 220+y]);
          polygon('sq', unit).color('accent').opacity(0.5).label('det=1');
        }},
        { label: '[[2,0.5],[0.5,1.5]]', frame(sv) {
          const { axes, point, polygon } = sv.math;
          axes('ax', [30, 220], { xLen: 280, yLen: 180, xLabel: 'x', yLabel: 'y', color: 'dim' });
          point('O', [30, 220]).color('primary').label('O');
          const unit = [[0,0],[60,0],[60,-60],[0,-60]].map(([x,y]) => [30+x, 220+y]);
          polygon('sq', unit).color('danger').opacity(0.5).label('det≈2.75')
            .matrixTransform(2, 0.5, 0.5, 1.5);
        }},
      ], { controls: true });
    },
  },
  {
    name: 'Compose: Rotation + Basis',
    desc: 'Basis vectors rotate with .rotate() (built-in) vs .matrixTransform().',
    width: 400, height: 260,
    setup(s) {
      const { point, vector } = s.math;
      const degs = [0, 45, 90, 135];
      s.steps(
        degs.map(d => ({
          label: `${d}°`,
          frame(sv) {
            const { point, vector } = sv.math;
            const O = [80, 200];
            point('O', O).color('primary').label('O').size(5);
            // Show original î, ĵ rotated
            vector('i', O, [O[0]+60, O[1]]).color('danger').label('î').strokeW(2)
              .rotate(d, O[0], O[1]);
            vector('j', O, [O[0], O[1]-60]).color('info').label('ĵ').strokeW(2)
              .rotate(d, O[0], O[1]);
          }
        })),
        { controls: true }
      );
    },
  },
];

const container = document.getElementById('sections');
for (const [si, sec] of sections.entries()) {
  const el = document.createElement('section');
  const sizeAttr = `width:${sec.width}px;height:${sec.height}px`;
  el.innerHTML = `<h2>${sec.name}</h2><div class="desc">${sec.desc}</div><div class="card"><div class="stage" id="st${si}" style="${sizeAttr}"></div></div>`;
  container.appendChild(el);
  const s = stage(`#st${si}`, { width: sec.width, height: sec.height, theme: 'warm' });
  sec.setup(s);
}
</script>
</body>
</html>

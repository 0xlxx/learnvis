<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Linear Algebra — learnvis</title>
  <link rel="stylesheet" href="../../theme.css">
  <style>
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem;line-height:1.6}
    h1{font-size:1.3rem;margin:0 0 0.3rem}
    .sub{color:var(--text-muted);font-size:0.82rem;margin:0 0 1.5rem}
    section{margin-bottom:2rem}
    section h2{font-size:0.9rem;margin:0 0 6px}
    .desc{font-size:0.72rem;color:var(--text-muted);margin-bottom:8px}
    .row{display:flex;gap:16px;flex-wrap:wrap}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
    .card .stage{display:block}
    .lv-stepper-host{margin-top:4px}
  </style>
</head>
<body>

<h1>Linear Algebra — coords()</h1>
<p class="sub">Natural math coordinates · explicit axes/grid · smooth transforms</p>

<div id="sections"></div>

<script type="module">
import { canvas, stepper } from 'learnvis';

const sections = [
  {
    name: 'Basis Vectors',
    desc: 'î (accent) + ĵ (danger) at origin. Drawn as explicit vectors.',
    width: 340, height: 260,
    setup(s) {
      s.render(() => {
        const vp = s.coords({ x: [-4, 4], y: [-3, 3] });
        vp.axes();
        vp.grid();
        vp.origin();
        vp.vector('i', [0, 0], [2.5, 0]).color('danger').label('î').stroke(2);
        vp.vector('j', [0, 0], [0, 2.5]).color('info').label('ĵ').stroke(2);
      });
    },
  },

  {
    name: 'Vector × Matrix Transform',
    desc: 'v = (3,0). Apply 90° rotation → shear → reflect.',
    width: 400, height: 300,
    setup(s) {
      return s.steps([
        { label: 'v = (3,0)', frame(sv) {
          const vp = sv.coords({ x: [-5, 5], y: [-4, 4] });
          vp.axes(); vp.grid(); vp.origin();
          vp.vector('v', [0, 0], [3, 0]).color('danger').label('v').stroke(2);
        }},
        { label: 'rot 90°', frame(sv) {
          const vp = sv.coords({ x: [-5, 5], y: [-4, 4] });
          vp.axes(); vp.grid(); vp.origin();
          vp.vector('v', [0, 0], [3, 0]).color('danger').label('v').stroke(2).rotate(90, 0, 0);
        }},
        { label: 'shear', frame(sv) {
          const vp = sv.coords({ x: [-5, 5], y: [-4, 4] });
          vp.axes(); vp.grid(); vp.origin();
          vp.vector('v', [0, 0], [3, 0]).color('danger').label('v').stroke(2).matrix(1, 0.5, 0.5, 1);
        }},
        { label: 'reflect', frame(sv) {
          const vp = sv.coords({ x: [-5, 5], y: [-4, 4] });
          vp.axes(); vp.grid(); vp.origin();
          vp.vector('v', [0, 0], [3, 0]).color('danger').label('v').stroke(2).matrix(1, 0, 0, -1);
        }},
      ], { controls: true });
    },
  },
  {
    name: 'Determinant — Unit Square',
    desc: '[[2,0.5],[0.5,1.5]]. det≈2.75. Area scales by |det|.',
    width: 400, height: 300,
    setup(s) {
      return s.steps([
        { label: 'Unit square', frame(sv) {
          const vp = sv.coords({ x: [-4, 4], y: [-3, 3] });
          vp.axes(); vp.grid(); vp.origin();
          vp.polygon('sq', [[0,0],[1,0],[1,-1],[0,-1]]).color('accent').opacity(0.5).label('det=1');
        }},
        { label: 'T(square)', frame(sv) {
          const vp = sv.coords({ x: [-4, 4], y: [-3, 3] });
          vp.axes(); vp.grid(); vp.origin();
          vp.polygon('sq', [[0,0],[1,0],[1,-1],[0,-1]]).color('danger').opacity(0.5).label('det≈2.75')
            .matrix(2, 0.5, 0.5, 1.5);
        }},
      ], { controls: true });
    },
  },
  {
    name: 'Eigenvectors — [[2,1],[1,2]]',
    desc: 'λ₁=3 on (1,1), λ₂=1 on (1,-1). Eigenvectors stay on their span.',
    width: 400, height: 300,
    setup(s) {
      return s.steps([
        { label: 'Basis + evecs', frame(sv) {
          const vp = sv.coords({ x: [-5, 5], y: [-4, 4] });
          vp.axes(); vp.grid(); vp.origin();
          vp.vector('e1', [0, 0], [1, 0]).color('accent').label('e₁').stroke(1.5);
          vp.vector('e2', [0, 0], [0, 1]).color('info').label('e₂').stroke(1.5);
          vp.vector('v1', [0, 0], [0.7, 0.7]).color('warning').label('v₁').stroke(2.5);
          vp.vector('v2', [0, 0], [0.7, -0.7]).color('success').label('v₂').stroke(2.5);
        }},
        { label: 'T applied', frame(sv) {
          const vp = sv.coords({ x: [-5, 5], y: [-4, 4] });
          vp.axes(); vp.grid(); vp.origin();
          vp.vector('e1', [0, 0], [1, 0]).color('accent').label('e₁').stroke(1.5).matrix(2,1,1,2);
          vp.vector('e2', [0, 0], [0, 1]).color('info').label('e₂').stroke(1.5).matrix(2,1,1,2);
          vp.vector('v1', [0, 0], [0.7, 0.7]).color('warning').label('3·v₁').stroke(2.5).matrix(2,1,1,2);
          vp.vector('v2', [0, 0], [0.7, -0.7]).color('success').label('1·v₂').stroke(2.5).matrix(2,1,1,2);
        }},
      ], { controls: true });
    },
  },
  {
    name: 'Basis Rotation 0°→135°',
    desc: 'î, ĵ rotate via .rotate() (built-in). coords() keeps origin centered.',
    width: 400, height: 300,
    setup(s) {
      const degs = [0, 30, 60, 90, 135];
      return s.steps(
        degs.map(d => ({
          label: `${d}°`,
          frame(sv) {
            const vp = sv.coords({ x: [-4, 4], y: [-3, 3] });
            vp.axes(); vp.grid(); vp.origin();
            vp.vector('i', [0, 0], [2.5, 0]).color('danger').label('î').stroke(2).rotate(d, 0, 0);
            vp.vector('j', [0, 0], [0, 2.5]).color('info').label('ĵ').stroke(2).rotate(d, 0, 0);
          }
        })),
        { controls: true }
      );
    },
  },
  {
    name: 'coords() — Function Plot',
    desc: 'Centered projection. x:[0,10], y:[-2,2]. Plot sin(x)*2 with point + vector.',
    width: 400, height: 260,
    setup(s) {
      s.render(() => {
        const vp = s.coords({ x: [0, 10], y: [-2, 2] });
        vp.axes();
        vp.grid();
        vp.origin();
        vp.curve('sin', x => Math.sin(x) * 2).color('danger').label('2sin(x)');
        vp.point('P', 3, 1.5).color('accent').label('P').size(5);
        vp.vector('v', [2, 0], [5, 1.5]).color('info').label('v');
      });
    },
  },
  {
    name: 'coords() — Centered Square Grid',
    desc: 'Centered domain [−3,3]×[−2,2] with vector + circle.',
    width: 400, height: 260,
    setup(s) {
      s.render(() => {
        const vp = s.coords({ x: [-3, 3], y: [-2, 2], margin: 0.1 });
        vp.axes();
        vp.grid();
        vp.origin({ color: 'primary', label: 'O' });
        vp.vector('u', [0, 0], [2, 1]).color('warning').label('u').stroke(2);
        vp.circle('c', 0, 0, 1.5).color('accent').opacity(0.4);
      });
    },
  },
];

const container = document.getElementById('sections');
for (const [si, sec] of sections.entries()) {
  const el = document.createElement('section');
  const sizeAttr = `width:${sec.width}px;height:${sec.height}px`;
  el.innerHTML = `<h2>${sec.name}</h2><div class="desc">${sec.desc}</div><div class="card"><div class="stage" id="st${si}" style="${sizeAttr}"></div><div class="lv-stepper-host"></div></div>`;
  container.appendChild(el);
  const s = canvas(`#st${si}`, { width: sec.width, height: sec.height, theme: 'warm' });
  const result = sec.setup(s);
  // If setup returns a StepsController, attach stepper
  if (result && typeof result.go === 'function') {
    const host = el.querySelector('.lv-stepper-host');
    if (host) stepper(host, result);
  }
}
</script>
</body>
</html>

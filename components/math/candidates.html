<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Math Primitives — Style Candidates</title>
  <link rel="stylesheet" href="../../theme.css">
  <style>
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem;line-height:1.6}
    h1{font-size:1.3rem;margin:0 0 0.3rem}
    .sub{color:var(--text-muted);font-size:0.82rem;margin:0 0 1.5rem}
    section{margin-bottom:2rem}
    section h2{font-size:0.9rem;margin:0 0 6px}
    section .desc{font-size:0.72rem;color:var(--text-muted);margin-bottom:8px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center}
    .card .name{font-size:0.7rem;color:var(--text-dim);margin-bottom:4px}
    .card .stage{width:220px;height:140px;display:block}
  </style>
</head>
<body>

<h1>Math Primitives — Style Candidates</h1>
<p class="sub">Pick your preferred style for each primitive</p>

<div id="sections"></div>

<script type="module">
import { canvas } from '@learnvis/vis2d';

const sections = [
  {
    name: 'Vector — stroke weight',
    desc: 'Line weight variants: 1.0 / 1.5 / 2.0 / 3.0',
    candidates: [
      { label:'1.0', draw(s){ s.vector('v',[30,100],[180,40]).color('dim').stroke(1.0); }},
      { label:'1.5', draw(s){ s.vector('v',[30,100],[180,40]).color('dim').stroke(1.5); }},
      { label:'2.0', draw(s){ s.vector('v',[30,100],[180,40]).color('dim').stroke(2.0); }},
      { label:'3.0', draw(s){ s.vector('v',[30,100],[180,40]).color('dim').stroke(3.0); }},
    ]
  },
  {
    name: 'Vector — arrow tip style',
    desc: 'Classic / thin / bold / pointed',
    candidates: [
      { label:'classic', draw(s){ s.vector('v',[30,100],[180,40]).color('dim').stroke(1.5); }},
      { label:'thin', draw(s){ s.vector('v',[30,100],[180,40]).color('dim').stroke(1.0); s.point('p',180,40); }},
      { label:'bold', draw(s){ s.vector('v',[30,100],[180,40]).color('dim').stroke(2.5); }},
      { label:'colored', draw(s){ s.vector('v',[30,100],[180,40]).color('danger').stroke(2); }},
    ]
  },
  {
    name: 'Point — marker style',
    desc: 'Filled circle / open circle / labeled / tiny',
    candidates: [
      { label:'filled', draw(s){ s.point('p',110,70).color('primary'); }},
      { label:'open', draw(s){ s.point('p',110,70).fill('#fff').color('primary').size(6); }},
      { label:'labeled', draw(s){ s.point('p',110,70).color('danger').label('P').size(6); }},
      { label:'tiny', draw(s){ s.point('p',110,70).color('primary').size(2); }},
    ]
  },
  {
    name: 'Line — dash style',
    desc: 'Solid / short dash / long dash / dotted',
    candidates: [
      { label:'solid',  draw(s){ s.line('s',30,70,190,70).color('dim').stroke(1.5); }},
      { label:'dashed', draw(s){ s.line('s',30,70,190,70).color('dim').stroke(1.5).dash('5 4'); }},
      { label:'long',   draw(s){ s.line('s',30,70,190,70).color('dim').stroke(1.5).dash('12 6'); }},
      { label:'dotted', draw(s){ s.line('s',30,70,190,70).color('dim').stroke(1.2).dash('1 5'); }},
    ]
  },
  {
    name: 'Polyline — multi-segment line',
    desc: 'Orthogonal / dashed / thick / long',
    candidates: [
      { label:'orthogonal', draw(s){ s.polyline('p',[[40,80],[80,80],[80,40],[180,40]]).color('primary').stroke(1.8); }},
      { label:'dashed', draw(s){ s.polyline('p',[[40,80],[80,80],[80,40],[180,40]]).color('dim').dash('5 3').stroke(1.5); }},
      { label:'thick', draw(s){ s.polyline('p',[[30,90],[60,90],[60,50],[100,50],[160,50]]).color('accent').stroke(3); }},
      { label:'long', draw(s){ s.polyline('p',[[30,100],[80,100],[80,30],[190,30]]).color('warning').stroke(1.5); }},
    ]
  },
  {
    name: 'Circle — fill opacity',
    desc: 'None / light / medium / full fill',
    candidates: [
      { label:'none',   draw(s){ s.circle('c',110,70,45).color('accent').stroke(1.5); }},
      { label:'light',  draw(s){ s.circle('c',110,70,45).color('accent').stroke(1.5).opacity(0.15); }},
      { label:'medium', draw(s){ s.circle('c',110,70,45).color('accent').stroke(1.5).opacity(0.4); }},
      { label:'full',   draw(s){ s.circle('c',110,70,45).color('accent').stroke(1.5).fill('acc').opacity(0.6); }},
    ]
  },
  {
    name: 'Polygon — fill vs stroke emphasis',
    desc: 'Stroke-only / light fill / bold fill / filled no stroke',
    candidates: [
      { label:'stroke', draw(s){ s.polygon('pg',[[50,100],[110,30],[170,100]]).fill('none').color('primary').stroke(2); }},
      { label:'light',  draw(s){ s.polygon('pg',[[50,100],[110,30],[170,100]]).color('primary').opacity(0.3); }},
      { label:'heavy',  draw(s){ s.polygon('pg',[[50,100],[110,30],[170,100]]).color('primary').stroke(3); }},
      { label:'no strk',draw(s){ s.fill('pg',[[50,100],[110,30],[170,100]]).color('primary').opacity(0.3); }},
    ]
  },
  {
    name: 'Angle — arc weight & label',
    desc: 'Thin / medium / thick arc; label vs no label',
    candidates: [
      { label:'thin',   draw(s){ s.angle('a',[110,90],[30,40],[190,60]).color('warning'); }},
      { label:'medium', draw(s){ s.angle('a',[110,90],[30,40],[190,60]).color('warning').stroke(2).label('θ'); }},
      { label:'thick',  draw(s){
        s.angle('a',[110,90],[30,40],[190,60]).color('warning').stroke(3).opacity(0.4).label('θ');
        s.line('r1',110,90,30,40).color('dim').stroke(0.8);
        s.line('r2',110,90,190,60).color('dim').stroke(0.8);
      }},
      { label:'minimal',draw(s){ s.angle('a',[110,90],[30,40],[190,60]).color('dim').stroke(1); }},
    ]
  },
  {
    name: 'Grid — density',
    desc: 'Sparse / normal / dense / no grid (axes only)',
    candidates: [
      { label:'sparse', draw(s){ s.gridScreen('g',[30,130],{width:160,height:100,spacing:80,color:'dim'}); }},
      { label:'normal', draw(s){ s.gridScreen('g',[20,120],{width:180,height:100,spacing:40,color:'dim'}); }},
      { label:'dense',  draw(s){ s.gridScreen('g',[20,120],{width:180,height:100,spacing:20,color:'dim'}); }},
      { label:'none',   draw(s){ s.axes('ax',[20,120],{xLen:180,yLen:100}); }},
    ]
  },
];

const container = document.getElementById('sections');
let stageId = 0;
for (const sec of sections) {
  const el = document.createElement('section');
  el.innerHTML = `<h2>${sec.name}</h2><div class="desc">${sec.desc}</div><div class="row" id="r${stageId}"></div>`;
  container.appendChild(el);

  const row = document.getElementById(`r${stageId}`);
  sec.candidates.forEach((c, j) => {
    const id = `st${stageId}_${j}`;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="name">${c.label}</div><div class="stage" id="${id}"></div>`;
    row.appendChild(card);

    const s = canvas(`#${id}`, { width: 220, height: 140, theme: 'warm' });
    s.render(() => c.draw(s));
  });
  stageId++;
}
</script>
</body>
</html>

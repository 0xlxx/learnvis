<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Math Primitives — Style Candidates</title>
  <link rel="stylesheet" href="../../theme.css">
  <style>
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem;line-height:1.6}
    h1{font-size:1.3rem;margin:0 0 0.3rem}
    .sub{color:var(--text-muted);font-size:0.82rem;margin:0 0 1.5rem}
    section{margin-bottom:2rem}
    section h2{font-size:0.9rem;margin:0 0 6px}
    section .desc{font-size:0.72rem;color:var(--text-muted);margin-bottom:8px}
    .row{display:flex;gap:10px;flex-wrap:wrap}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center}
    .card .name{font-size:0.7rem;color:var(--text-dim);margin-bottom:4px}
    .card .stage{width:220px;height:140px;display:block}
  </style>
</head>
<body>

<h1>Math Primitives — Style Candidates</h1>
<p class="sub">Pick your preferred style for each primitive</p>

<div id="sections"></div>

<script type="module">
import { stage } from '../../dist/learnvis.mjs?v=4';

const sections = [
  {
    name: 'Vector — stroke width',
    desc: 'Line weight variants: 1.0 / 1.5 / 2.0 / 3.0',
    candidates: [
      { label:'1.0', draw(s){ const { vector } = s.math; vector([30,100],[180,40]).stroke('#555',1.0); }},
      { label:'1.5', draw(s){ const { vector } = s.math; vector([30,100],[180,40]).stroke('#555',1.5); }},
      { label:'2.0', draw(s){ const { vector } = s.math; vector([30,100],[180,40]).stroke('#555',2.0); }},
      { label:'3.0', draw(s){ const { vector } = s.math; vector([30,100],[180,40]).stroke('#555',3.0); }},
    ]
  },
  {
    name: 'Vector — arrow tip style',
    desc: 'Sharp classical / blunt modern / filled triangle',
    candidates: [
      { label:'classic', draw(s){ const { vector } = s.math; vector([30,100],[180,40]).stroke('#555',1.5); }},
      { label:'thin', draw(s){ const { vector, point } = s.math; vector([30,100],[180,40]).stroke('#777',1.0); point([180,40]); }},
      { label:'bold', draw(s){ const { vector } = s.math; vector([30,100],[180,40]).stroke('#444',2.5); }},
      { label:'open', draw(s){
        const g = s.ctx.stage.edges;
        const fx=30, fy=100, tx=180, ty=40;
        const dx=tx-fx, dy=ty-fy, len=Math.sqrt(dx*dx+dy*dy);
        const nx=dx/len, ny=dy/len, siz=10;
        g.append('line').attr('x1',fx).attr('y1',fy).attr('x2',tx).attr('y2',ty).attr('stroke','#666').attr('stroke-width',1.5);
        g.append('polygon').attr('points',
          `${tx},${ty} ${tx-nx*siz+ny*siz*0.4},${ty-ny*siz-nx*siz*0.4} ${tx-nx*siz-ny*siz*0.4},${ty-ny*siz+nx*siz*0.4}`)
          .attr('fill','none').attr('stroke','#666').attr('stroke-width',1.2);
      }},
    ]
  },
  {
    name: 'Point — marker style',
    desc: 'Filled circle / open circle / cross / diamond',
    candidates: [
      { label:'filled', draw(s){ const { point } = s.math; point([110,70]).color('primary'); }},
      { label:'open', draw(s){ const { point } = s.math; point([110,70]).fill('#fff').stroke('primary',2); }},
      { label:'cross', draw(s){
        const g = s.ctx.stage.bg;
        g.append('line').attr('x1',102).attr('y1',70).attr('x2',118).attr('y2',70).attr('stroke','#555').attr('stroke-width',1.5);
        g.append('line').attr('x1',110).attr('y1',62).attr('x2',110).attr('y2',78).attr('stroke','#555').attr('stroke-width',1.5);
      }},
      { label:'diamond', draw(s){
        s.ctx.stage.bg.append('polygon').attr('points','110,60 118,70 110,80 102,70').attr('fill','#fff').attr('stroke','#555').attr('stroke-width',1.5);
      }},
    ]
  },
  {
    name: 'Segment — dash style',
    desc: 'Solid / short dash / long dash / dotted',
    candidates: [
      { label:'solid',  draw(s){ const { segment } = s.math; segment([30,70],[190,70]).stroke('#555',1.5); }},
      { label:'dashed', draw(s){ const { segment } = s.math; segment([30,70],[190,70]).stroke('#555',1.5).dashed('5 4'); }},
      { label:'long',   draw(s){ const { segment } = s.math; segment([30,70],[190,70]).stroke('#555',1.5).dashed('12 6'); }},
      { label:'dotted', draw(s){ const { segment } = s.math; segment([30,70],[190,70]).stroke('#555',1.2).dashed('1 5'); }},
    ]
  },
  {
    name: 'Polyline — multi-segment line',
    desc: 'Orthogonal / dashed / curved / thick',
    candidates: [
      { label:'orthogonal', draw(s){ const { polyline } = s.math; polyline('p',[[40,80],[80,80],[80,40],[180,40]]).color('primary').strokeW(1.8); }},
      { label:'dashed', draw(s){ const { polyline } = s.math; polyline('p',[[40,80],[80,80],[80,40],[180,40]]).color('dim').dashed('5 3').strokeW(1.5); }},
      { label:'thick', draw(s){ const { polyline } = s.math; polyline('p',[[30,90],[60,90],[60,50],[100,50],[160,50]]).color('accent').strokeW(2.5); }},
      { label:'long', draw(s){ const { polyline } = s.math; polyline('p',[[30,100],[80,100],[80,30],[190,30]]).color('warning').strokeW(1.5); }},
    ]
  },
  {
    name: 'Circle — fill opacity',
    desc: 'None / light / medium / full fill',
    candidates: [
      { label:'none',   draw(s){ const { circle } = s.math; circle([110,70],45).stroke('accent',1.5); }},
      { label:'light',  draw(s){ const { circle } = s.math; circle([110,70],45).stroke('accent',1.5).fill(s.palette.accent.a(8)); }},
      { label:'medium', draw(s){ const { circle } = s.math; circle([110,70],45).stroke('accent',1.5).fill(s.palette.accent.a(20)); }},
      { label:'full',   draw(s){ const { circle } = s.math; circle([110,70],45).stroke('accent',1.5).fill(s.palette.accent.bg); }},
    ]
  },
  {
    name: 'Polygon — fill vs stroke emphasis',
    desc: 'Stroke-only / light fill / bold fill / filled no stroke',
    candidates: [
      { label:'stroke', draw(s){ const { polygon } = s.math; polygon([[50,100],[110,30],[170,100]]).fill('none').stroke('primary',2); }},
      { label:'light',  draw(s){ const { polygon } = s.math; polygon([[50,100],[110,30],[170,100]]).color('primary'); }},
      { label:'heavy',  draw(s){ const { polygon } = s.math; polygon([[50,100],[110,30],[170,100]]).fill(s.palette.primary.bg).stroke('primary',2.5); }},
      { label:'no strk',draw(s){ const { polygon } = s.math; polygon([[50,100],[110,30],[170,100]]).fill(s.palette.primary.a(25)).stroke('none',0); }},
    ]
  },
  {
    name: 'Angle — arc weight & label',
    desc: 'Thin / medium / thick arc; label vs no label',
    candidates: [
      { label:'thin',   draw(s){ const { angle } = s.math; angle([110,90],[30,40],[190,60]).color('warning'); }},
      { label:'medium', draw(s){ const { angle } = s.math; angle([110,90],[30,40],[190,60]).stroke('#c80',2).label('θ'); }},
      { label:'thick',  draw(s){
        const { angle, segment } = s.math;
        angle([110,90],[30,40],[190,60]).stroke('#c80',2.5).fill(s.palette.warning.a(25)).label('θ');
        segment([110,90],[30,40]).stroke('#999',0.8);
        segment([110,90],[190,60]).stroke('#999',0.8);
      }},
      { label:'minimal',draw(s){
        const { angle } = s.math;
        angle([110,90],[30,40],[190,60]).stroke('#666',1.0);
      }},
    ]
  },
  {
    name: 'Grid — density',
    desc: 'Sparse / normal / dense / no grid (axes only)',
    candidates: [
      { label:'sparse', draw(s){ const { grid } = s.math; grid([30,130],{width:160,height:100,spacing:80,stroke:'#ddd'}); }},
      { label:'normal', draw(s){ const { grid } = s.math; grid([20,120],{width:180,height:100,spacing:40,stroke:'#ddd'}); }},
      { label:'dense',  draw(s){ const { grid } = s.math; grid([20,120],{width:180,height:100,spacing:20,stroke:'#eee'}); }},
      { label:'none',   draw(s){ const { axes } = s.math; axes([20,120],{xLen:180,yLen:100}); }},
    ]
  },
];

const container = document.getElementById('sections');
let stageId = 0;
for (const sec of sections) {
  const el = document.createElement('section');
  el.innerHTML = `<h2>${sec.name}</h2><div class="desc">${sec.desc}</div><div class="row" id="r${stageId}"></div>`;
  container.appendChild(el);

  const row = document.getElementById(`r${stageId}`);
  sec.candidates.forEach((c, j) => {
    const id = `st${stageId}_${j}`;
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="name">${c.label}</div><div class="stage" id="${id}"></div>`;
    row.appendChild(card);

    const s = stage(`#${id}`, { width: 220, height: 140, theme: 'warm' });
    c.draw(s);
  });
  stageId++;
}
</script>
</body>
</html>

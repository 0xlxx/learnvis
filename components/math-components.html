<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Math Components — learnvis</title>
  <link rel="stylesheet" href="../theme.css">
  <style>
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem;line-height:1.6}
    h1{font-size:1.3rem;margin:0 0 0.3rem}
    .sub{color:var(--text-muted);font-size:0.82rem;margin:0 0 1.5rem}
    .row{display:flex;gap:16px;flex-wrap:wrap}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
    .card h3{font-size:0.75rem;margin:0 0 4px}
    .stage{width:260px;height:200px;display:block}
  </style>
</head>
<body>
<h1>Math Components</h1>
<p class="sub">All primitives: point, vector, segment, circle, polygon, angle, rightAngle, projection, fill, fn</p>
<div class="row" id="grid"></div>

<script src="../dist/learnvis.js"></script>
<script>
var cells = [
  /* ── POINT ── */
  { name: 'point', render: function(s) {
    s.math.axes('ax', [130,100], { xLen:100, yLen:80, color:'dim' });
    s.math.point('O', [130,100]).color('primary').label('O');
    s.math.point('A', [180,60]).color('danger').label('A').size(6);
    s.math.point('B', [80,130]).color('info').label('B', 'left').size(5);
  }},

  /* ── VECTOR ── */
  { name: 'vector', render: function(s) {
    s.math.point('O', [60,130]).color('primary').label('O');
    s.math.vector('v', [60,130], [200,60]).color('danger').label('v');
    s.math.vector('w', [60,130], [140,170]).color('info').label('w');
  }},

  /* ── VECTOR · transform ── */
  { name: 'vector · rotate', render: function(s) {
    s.math.axes('ax', [120,110], { xLen:100, yLen:90, color:'dim' });
    s.math.point('O', [120,110]).color('primary').label('O');
    s.math.vector('v', [120,110], [200,110]).color('danger').label('v')
      .rotate(30, 120, 110);
  }},

  /* ── SEGMENT ── */
  { name: 'segment', render: function(s) {
    s.math.segment('s1', [30,150], [150,50]).color('primary').label('AB');
    s.math.segment('s2', [150,50], [230,120]).color('danger').dashed('5 3').label('BC');
    s.math.point('A', [30,150]).size(3).color('dim');
    s.math.point('B', [150,50]).size(3).color('dim');
    s.math.point('C', [230,120]).size(3).color('dim');
  }},

  /* ── CIRCLE ── */
  { name: 'circle', render: function(s) {
    s.math.circle('c', [130,100], 50).color('primary').fill('primary');
    s.math.point('C', [130,100]).color('primary').label('C').size(4);
  }},

  /* ── POLYGON · triangle ── */
  { name: 'polygon · triangle', render: function(s) {
    s.math.polygon('tri', [[130,30],[220,160],[40,160]]).color('info').opacity(0.5);
  }},

  /* ── POLYGON · rect ── */
  { name: 'polygon · rect', render: function(s) {
    s.math.rect('box', 130, 100, 120, 70).color('danger').opacity(0.4);
  }},

  /* ── POLYGON · ngon ── */
  { name: 'polygon · ngon', render: function(s) {
    s.math.ngon('hex', 130, 100, 60, 6).color('primary').opacity(0.4);
  }},

  /* ── POLYGON · ellipse ── */
  { name: 'polygon · ellipse', render: function(s) {
    s.math.ellipse('e', 130, 100, 70, 40).color('info').opacity(0.4);
  }},

  /* ── ANGLE ── */
  { name: 'angle', render: function(s) {
    var ox=80, oy=120;
    s.math.axes('ax', [ox,oy], { xLen:140, yLen:100, color:'dim' });
    s.math.point('O', [ox,oy]).color('primary').label('O');
    s.math.segment('r1', [ox,oy], [ox+100,oy]).color('dim');
    s.math.segment('r2', [ox,oy], [ox+70,oy-70]).color('dim');
    s.math.angle('a', [ox,oy], [ox+100,oy], [ox+70,oy-70], { size: 24 }).color('danger').label('45°');
  }},

  /* ── RIGHT ANGLE ── */
  { name: 'rightAngle 直角标记', render: function(s) {
    var ox=60, oy=140;
    s.math.segment('h', [ox,oy], [ox+140,oy]).color('dim');
    s.math.segment('v', [ox,oy], [ox,oy-100]).color('dim');
    s.math.rightAngle('R', [ox,oy], [ox+60,oy], [ox,oy-60], { color: 'danger', size: 10 });
  }},

  /* ── PROJECTION ── */
  { name: 'projection 垂足', render: function(s) {
    var lf=[30,130], lt=[230,60];
    s.math.segment('base', lf, lt).color('dim');
    s.math.point('P', [120,50]).color('primary').label('P').size(5);
    s.math.projection('proj', [120,50], lf, lt, { color:'danger', pointColor:'danger' });
  }},

  /* ── FILL ── */
  { name: 'fill 填充', render: function(s) {
    s.math.fill('f1', [[30,150],[130,30],[230,150]], { color:'info', opacity:0.25 });
    s.math.fill('f2', [[80,150],[130,90],[180,150]], { color:'danger', opacity:0.2 });
    s.math.segment('top', [130,30],[230,150]).color('dim').dashed('4 3');
  }},

  /* ── FILL · integral ── */
  { name: 'fillFn · 积分', render: function(s) {
    s.math.axes('ax', [40,150], { xLen:200, yLen:130, color:'dim' });
    s.math.fillFn('area', function(x) { return Math.sin(x) * 1.5; }, {
      domain: [0, Math.PI], x:40, y:150, width:200, height:130, color:'accent', baseline:0,
    });
    s.math.fn('curve', function(x) { return Math.sin(x) * 1.5; }, {
      domain: [0, Math.PI], x:40, y:150, width:200, height:130,
    }).color('accent');
  }},

  /* ── FN ── */
  { name: 'fn · sin', render: function(s) {
    s.math.axes('ax', [40,100], { xLen:200, yLen:80, xLabel:'x', yLabel:'y', color:'dim' });
    s.math.fn('sin', function(x) { return Math.sin(x) * 1.5; }, {
      domain: [0, 2*Math.PI], x:40, y:100, width:200, height:80,
    }).color('primary');
  }},

  /* ── FN · parabola ── */
  { name: 'fn · x²', render: function(s) {
    s.math.axes('ax', [40,150], { xLen:200, yLen:130, xLabel:'x', yLabel:'y', color:'dim' });
    s.math.fn('p', function(x) { return x*x; }, {
      domain: [-3, 3], x:40, y:150, width:200, height:130, samples:100,
    }).color('danger');
  }},

  /* ── GRID ── */
  { name: 'grid + axes', render: function(s) {
    s.math.grid('g', [10,10], { width:240, height:180, spacing:30, color:'dim' });
    s.math.axes('ax', [130,100], { xLen:110, yLen:80, xLabel:'x', yLabel:'y', color:'primary', strokeW:1.6 });
  }},

  /* ── SYMBOL ── */
  { name: 'symbol', render: function(s) {
    var types = ['circle','cross','diamond','square','star','triangle','wye'];
    for (var i=0; i<types.length; i++) {
      var a = (2*Math.PI*i)/types.length - Math.PI/2;
      var x = 130 + 60*Math.cos(a), y = 100 + 60*Math.sin(a);
      s.math.symbol('s'+i, [x,y], { type:types[i], size:6, color:'danger', fill:'danger' });
    }
  }},

  /* ── ARC ── */
  { name: 'arc', render: function(s) {
    s.math.arc('a1', [130,100], { outerR:60, startAngle:0, endAngle:Math.PI*1.3, color:'primary', fill:'primary' });
    s.math.arc('a2', [130,100], { innerR:40, outerR:70, startAngle:Math.PI*1.3, endAngle:Math.PI*2, color:'info', fill:'info' });
  }},

  /* ── PALETTE ── */
  { name: 'palette 色板', render: function(s) {
    var colors = ['primary','danger','warning','success','info','accent','dim'];
    for (var i = 0; i < colors.length; i++) {
      var y = 20 + i * 24;
      s.math.rect(colors[i], 130, y, 200, 20).color(colors[i]).opacity(0.3);
      s.math.point(colors[i]+'p', [20, y]).color(colors[i]).label(colors[i], 'right').size(5);
    }
  }},
];

var container = document.getElementById('grid');
cells.forEach(function(cell) {
  var el = document.createElement('div');
  el.className = 'card';
  el.innerHTML = '<h3>' + cell.name + '</h3><div class="stage" id="s_' + cell.name.replace(/[^a-zA-Z0-9]/g,'_') + '"></div>';
  container.appendChild(el);

  var s = LearnVis.stage('#s_' + cell.name.replace(/[^a-zA-Z0-9]/g,'_'), { width:260, height:200, theme:'paper' });
  s.steps([{ frame: cell.render }]);
});
</script>
</body>
</html>

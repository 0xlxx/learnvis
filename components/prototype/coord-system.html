<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Prototype: Coord System Designs</title>
  <link rel="stylesheet" href="../../theme.css">
  <style>
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:1.5rem;line-height:1.5}
    h1{font-size:1rem;margin:0 0 0.2rem}
    .sub{color:var(--text-muted);font-size:0.75rem;margin:0 0 1rem}
    .bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:1.5rem}
    .bar button{font-size:0.7rem;padding:4px 12px;border:1px solid var(--border);border-radius:6px;background:var(--card);cursor:pointer}
    .bar button.on{background:var(--blue-10);border-color:var(--blue)}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:900px){.grid{grid-template-columns:1fr}}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:8px}
    .card .name{font-size:0.7rem;font-weight:600;margin-bottom:4px}
    .card .note{font-size:0.6rem;color:var(--text-dim);margin-top:4px}
    .stage{display:block}
  </style>
</head>
<body>

<h1>Prototype: Coordinate System Designs</h1>
<p class="sub">Toggle variations → pick the right behavior. <b>Throwaway</b> — answer the question, then delete.</p>

<div class="bar" id="bar"></div>
<div class="grid" id="grid"></div>

<script type="module">
import { stage } from '../../dist/learnvis.mjs?v=5';

const VARIANTS = [
  {
    id: 'viewport-center',
    name: 'A: viewport() centered',
    note: 'viewport({x:[-5,5],y:[-4,4]}). Auto axes+grid+O. Grid fills canvas.',
    w: 360, h: 260,
    draw(s) {
      const vp = s.math.viewport({ x: [-5, 5], y: [-4, 4] });
      vp.vector('v', [0, 0], [3, 1]).color('danger').label('v').strokeW(2);
      vp.circle('c', [0, 0], 2).color('accent').opacity(0.3);
      vp.point('P', 3, 1, { color: 'danger', label: 'P', size: 5 });
    },
  },
  {
    id: 'viewport-no-margin',
    name: 'B: viewport() margin=0',
    note: 'No padding. Transforms may clip.',
    w: 360, h: 260,
    draw(s) {
      const vp = s.math.viewport({ x: [-5, 5], y: [-4, 4], margin: 0 });
      vp.vector('v', [0, 0], [3, 1]).color('danger').label('v').strokeW(2);
      vp.point('P', 3, 1, { color: 'danger', label: 'P', size: 5 });
    },
  },
  {
    id: 'coords-bl',
    name: 'C: coords() bottom-left',
    note: 'coords(id,[60,200],{xDomain:[0,10],yDomain:[-2,2]}). Traditional math-plot style.',
    w: 360, h: 260,
    draw(s) {
      const c = s.math.coords('c', [60, 200], { xDomain: [0, 10], yDomain: [-2, 2] });
      c.axes({ color: 'dim' });
      c.grid({ spacing: 30, color: 'dim' });
      c.fn('sin', x => Math.sin(x), { color: 'danger', label: 'sin(x)' });
      c.point('P', 4, 0.9, { color: 'accent', label: 'P', size: 5 });
      c.vector('v', [2, 0], [5, 1], { color: 'info', label: 'v' });
    },
  },
  {
    id: 'coords-bl-small',
    name: 'D: coords() bottom-left, small domain',
    note: 'xDomain:[0,3],yDomain:[-1,1]. Grid=300x200 px area but math domain is tiny. Is this correct?',
    w: 360, h: 260,
    draw(s) {
      const c = s.math.coords('d', [60, 200], { xDomain: [0, 3], yDomain: [-1, 1] });
      c.axes({ color: 'dim' });
      c.grid({ spacing: 30, color: 'dim' });
      c.fn('sin', x => Math.sin(x * 2), { color: 'danger', label: 'sin(2x)' });
      c.point('P', 1.5, 0.5, { color: 'accent', label: 'P', size: 5 });
    },
  },
  {
    id: 'coords-center',
    name: 'E: coords() center (manual)',
    note: 'coords(id,\'center\',{x:[-5,5],y:[-4,4]}). Manual axes+grid. Like viewport but explicit.',
    w: 360, h: 260,
    draw(s) {
      const c = s.math.coords('e', 'center', { xDomain: [-5, 5], yDomain: [-4, 4], margin: 0.15 });
      c.axes({ color: 'dim' });
      c.grid({ spacing: 40, color: 'dim' });
      c.point('O', 0, 0, { color: 'primary', label: 'O', size: 5 });
      c.vector('v', [0, 0], [3, 1]).color('danger').label('v').strokeW(2);
    },
  },
  {
    id: 'old-style',
    name: 'F: Raw primitives (no coords)',
    note: 'vector([100,200],[300,150]). Raw screen pixels. No math mapping.',
    w: 360, h: 260,
    draw(s) {
      const { axes, point, vector } = s.math;
      axes('ax', [30, 220], { xLen: 300, yLen: 180, xLabel: 'x', yLabel: 'y', color: 'dim' });
      point('O', [30, 220]).color('primary').label('O').size(5);
      vector('v', [30, 220], [250, 150]).color('danger').label('v').strokeW(2);
    },
  },
];

const grid = document.getElementById('grid');
const bar = document.getElementById('bar');
const stages = [];

for (const v of VARIANTS) {
  // Button
  const btn = document.createElement('button');
  btn.textContent = v.id.split('-').pop().toUpperCase();
  btn.title = v.name;
  btn.onclick = () => highlight(v.id);
  bar.appendChild(btn);

  // Card
  const card = document.createElement('div');
  card.className = 'card';
  card.id = 'card-' + v.id;
  card.innerHTML = `<div class="name">${v.name}</div><div class="stage" id="st-${v.id}" style="width:${v.w}px;height:${v.h}px"></div><div class="note">${v.note}</div>`;
  grid.appendChild(card);
}

let current = VARIANTS[0].id;

function highlight(id) {
  current = id;
  bar.querySelectorAll('button').forEach(b => b.classList.toggle('on', b.textContent === id.split('-').pop().toUpperCase()));
  document.getElementById('card-' + id)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// Init all
for (const v of VARIANTS) {
  const s = stage('#st-' + v.id, { width: v.w, height: v.h, theme: 'warm' });
  s.render(() => v.draw(s));
  stages[v.id] = s;
}
bar.querySelector('button')?.classList.add('on');
</script>
</body>
</html>

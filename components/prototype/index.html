<!doctype html>

<head>

  <link rel="stylesheet" href="../../theme.css">
  <style>
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem;line-height:1.6;max-width:720px}
    h1{font-size:1.2rem;margin:0 0 .3rem}

      text-decoration:none;color:var(--text);background:var(--card);font-size:.78rem;transition:all .15s}

    .list a .label{font-weight:600}
    .list a .desc{font-size:.68rem;color:var(--text-dim);display:block;margin-top:2px}
    .tag{display:inline-block;font-size:.6rem;padding:1px 6px;border-radius:3px;margin-left:6px;
      background:var(--blue-10);color:var(--blue-600)}
    .tag.warn{background:var(--yellow-10);color:var(--stroke-yellow)}
    hr{border:0;border-top:1px solid var(--border);margin:2rem 0}

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Math Primitives — learnvis</title>
  <link rel="stylesheet" href="../theme.css">
  <style>
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem;line-height:1.6}
    h1{font-size:1.3rem;margin:0 0 0.3rem}
    .sub{color:var(--text-muted);font-size:0.82rem;margin:0 0 1rem}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px}
    .card h3{font-size:0.78rem;margin:0 0 4px;color:var(--text-muted)}
    .card code{font-size:0.7rem;color:var(--text-dim);display:block;margin-bottom:6px}
    .card .stage{width:100%}
  </style>
</head>
<body>

<h1>Math Primitives</h1>
<p class="sub">Vectors, points, segments, circles, polygons, angles, grids, axes</p>

<div class="grid" id="grid"></div>

<script src="../dist/learnvis.js"></script>
<script>
const items = [
  {
    title: 'vector',
    code: 's.math.vector([60,140], [280,60]).color("primary").label("v⃗")',
    draw(s) {
      s.math.vector([60,140], [280,60]).color('primary').label('v⃗');
      s.math.vector([60,160], [180,200]).stroke('#999', 1.5).dashed().label('w⃗', 'below');
    },
  },
  {
    title: 'point + segment',
    code: 's.math.point([80,120]).color("danger").label("A")  /  s.math.segment(A, B)',
    draw(s) {
      s.math.point([80,120]).color('danger').label('A');
      s.math.point([250,80]).color('primary').label('B');
      s.math.point([220,180]).color('info').label('C');
      s.math.segment([80,120], [250,80]).stroke('dim', 1.5);
      s.math.segment([250,80], [220,180]).stroke('dim', 1.5);
      s.math.segment([220,180], [80,120]).stroke('dim', 1.5).dashed();
    },
  },
  {
    title: 'circle',
    code: 's.math.circle([160,120], 70).stroke("accent", 2)',
    draw(s) {
      s.math.circle([160,130], 70).stroke('accent', 1.8);
      s.math.circle([160,130], 40).stroke('primary', 1.2).dashed();
      s.math.point([160,130]).color('danger').label('O');
    },
  },
  {
    title: 'polygon',
    code: 's.math.polygon([[60,160],[160,50],[260,160],[200,200],[120,200]])',
    draw(s) {
      s.math.polygon([[60,170],[160,50],[260,170],[220,200],[100,200]]).color('primary');
    },
  },
  {
    title: 'angle',
    code: 's.math.angle(vertex, ray1, ray2).color("warning").label("θ")',
    draw(s) {
      s.math.angle([160,140], [60,80], [260,120]).color('warning').label('θ');
      s.math.segment([160,140], [60,80]).stroke('dim', 0.8);
      s.math.segment([160,140], [260,120]).stroke('dim', 0.8);
      s.math.point([160,140]).color('danger');
    },
  },
  {
    title: 'grid + axes',
    code: 's.math.grid([60,200],{width:240,height:160,spacing:40})  /  s.math.axes()',
    draw(s) {
      s.math.grid([60,190], { width: 240, height: 160, spacing: 40 });
      s.math.axes([60,190], { xLen: 240, yLen: 160, xLabel: 'x', yLabel: 'y' });
    },
  },
  {
    title: 'triangle (composed)',
    code: 'vector + point + angle composed together',
    draw(s) {
      const A=[80,170], B=[250,170], C=[160,60];
      s.math.polygon([A,B,C]).fill('none').stroke('primary', 2);
      s.math.point(A).color('danger').label('A', 'below');
      s.math.point(B).color('primary').label('B', 'below');
      s.math.point(C).color('accent').label('C');
      s.math.angle(A, C, B).color('warning').label('α');
      s.math.angle(B, A, C).color('info').label('β');
      s.math.angle(C, B, A).color('accent').label('γ');
    },
  },
  {
    title: 'fn — function curve',
    code: 's.math.fn(x => Math.sin(x), { domain:[0,6.28], range:[-1,1], x:60, y:180, width:240, height:140 })',
    draw(s) {
      s.math.grid([60, 180], { width: 240, height: 140, spacing: 40 });
      s.math.axes([60, 180], { xLen: 240, yLen: 140 });
      s.math.fn(x => Math.sin(x * 2) * 60 + 80, { domain: [0, 6.28], range: [0, 140], x: 60, y: 180, width: 240, height: 140 })
        .color('primary').label('f(x)');
    },
  },
    code: 'two vectors from same origin',
    draw(s) {
      const O=[80,150], A=[200,50], B=[250,170];
      s.math.vector(O, A).color('primary').label('u⃗');
      s.math.vector(O, B).color('accent').label('v⃗');
      s.math.vector(A, [A[0]+B[0]-O[0], A[1]+B[1]-O[1]]).stroke('#aaa', 1.5).dashed();
      s.math.vector(B, [B[0]+A[0]-O[0], B[1]+A[1]-O[1]]).stroke('#aaa', 1.5).dashed();
      s.math.point(O).color('danger').label('O', 'below');
    },
  },
];

const grid = document.getElementById('grid');
items.forEach((item, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<h3>${item.title}</h3><code>${item.code}</code><div class="stage" id="st${i}"></div>`;
  grid.appendChild(card);

  const s = LearnVis.stage('#st' + i, { width: 320, height: 220, theme: 'warm' });
  item.draw(s);
});
</script>
</body>
</html>

<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>callout — explicit placement API</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="theme.css">
  <style>
    *{box-sizing:border-box} body{background:var(--bg);color:var(--text);font-family:var(--font);margin:0;padding:2rem;line-height:1.6}
    h1{font-size:1.2rem;margin:0 0 0.3rem}
    .sub{color:var(--text-muted);font-size:0.82rem;margin-bottom:1.5rem}
    #d3-stage{width:100%;max-width:780px;aspect-ratio:780/400;background:var(--card);border:1px solid var(--border);border-radius:10px}
  </style>
</head>
<body>

<h1>callout — AI gives {x,y} + place, code renders</h1>
<p class="sub">13 nodes · 4 tiers · 13 labels with explicit direction</p>

<div id="d3-stage"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="dist/vis.js"></script>
<script>
const W = 780, H = 400;
const ctx = Vis.create('#d3-stage', { width: W, height: H, margin: 48 });
const { palette, show, node, edge, group, callout } = ctx;
const p = palette;

const N = {
  browser: { id: 'browser', x: 95,  y: 90 },
  mobile:  { id: 'mobile',  x: 95,  y: 192 },
  sdk:     { id: 'sdk',     x: 95,  y: 294 },
  cdn:     { id: 'cdn',     x: 250, y: 90 },
  dns:     { id: 'dns',     x: 250, y: 192 },
  lb:      { id: 'lb',      x: 250, y: 294 },
  gw:      { id: 'gw',      x: 440, y: 85 },
  auth:    { id: 'auth',    x: 440, y: 160 },
  wa:      { id: 'wa',      x: 440, y: 235 },
  wb:      { id: 'wb',      x: 440, y: 310 },
  cache:   { id: 'cache',   x: 625, y: 115 },
  pg:      { id: 'pg',      x: 625, y: 205 },
  mq:      { id: 'mq',      x: 625, y: 295 },
};

const NAME = {
  browser:'Chrome', mobile:'iOS', sdk:'SDK',
  cdn:'CDN', dns:'DNS', lb:'LB',
  gw:'GW', auth:'Auth', wa:'Wrk A', wb:'Wrk B',
  cache:'Cache', pg:'PG', mq:'MQ',
};

const clientNodes  = [N.browser, N.mobile, N.sdk];
const edgeNodes    = [N.cdn, N.dns, N.lb];
const serviceNodes = [N.gw, N.auth, N.wa, N.wb];
const dataNodes    = [N.cache, N.pg, N.mq];

const E = [
  [N.browser, N.cdn], [N.mobile, N.cdn], [N.sdk, N.lb],
  [N.cdn, N.lb], [N.dns, N.lb], [N.lb, N.gw],
  [N.gw, N.auth], [N.auth, N.wa], [N.auth, N.wb],
  [N.wa, N.cache], [N.wb, N.cache],
  [N.wa, N.pg], [N.wb, N.pg], [N.wb, N.mq],
];

show(() => {
  group(clientNodes,  { stroke: p.accent.fg,  fill: p.accent.a(5) });
  group(edgeNodes,    { stroke: p.info.fg,    fill: p.info.a(5) });
  group(serviceNodes, { stroke: p.primary.fg, fill: p.primary.a(5) });
  group(dataNodes,    { stroke: p.success.fg, fill: p.success.a(5) });

  clientNodes.forEach(n  => node(n, { stroke: p.accent.fg,  fill: p.accent.bg,  text: NAME[n.id] }));
  edgeNodes.forEach(n    => node(n, { stroke: p.info.fg,    fill: p.info.bg,     text: NAME[n.id] }));
  serviceNodes.forEach(n => node(n, { stroke: p.primary.fg, fill: p.primary.bg,  text: NAME[n.id] }));
  dataNodes.forEach(n    => node(n, { stroke: p.success.fg, fill: p.success.bg,  text: NAME[n.id] }));
  node.emph(N.gw,    { text: NAME[N.gw.id] });
  node.r(N.auth,     { text: NAME[N.auth.id] });
  node.emph(N.cache, { text: NAME[N.cache.id] });

  const eo = (stroke, dash) => ({ stroke, strokeW: 1.6, dash: dash || '' });
  [
    { is: [0,1,2],           op: eo(p.accent.a(60),  '4 3') },
    { is: [3,4,5],           op: eo(p.info.a(70),     '') },
    { is: [6,7,8],           op: eo(p.primary.a(60),  '2 2') },
    { is: [9,10,11,12,13],   op: eo(p.success.a(70),  '') },
  ].forEach(({ is, op }) => is.forEach(i => edge(E[i][0], E[i][1], op)));

  // ═══════════════════════════════════════════════════════
  // callout({x,y}, html, { place, gap, style })
  //
  // AI decides:
  //   {x,y}  — anchor point (SVG coords)
  //   place  — 'above' | 'below' | 'left' | 'right'
  //   gap    — distance from anchor to label edge
  // Code renders the DOM label at that position.
  // ═══════════════════════════════════════════════════════

  // Tier headers (4) — above group rects
  callout({ x: 95,  y: 67 },  '<b>Client Tier</b>',  { place: 'above', gap: 10, style: { fontSize: '13px', color: p.accent.fg } });
  callout({ x: 250, y: 67 },  '<b>Edge Tier</b>',    { place: 'above', gap: 10, style: { fontSize: '13px', color: p.info.fg } });
  callout({ x: 440, y: 62 },  '<b>Service Mesh</b>', { place: 'above', gap: 10, style: { fontSize: '13px', color: p.primary.fg } });
  callout({ x: 625, y: 318 }, '<b>Data Stores</b>',  { place: 'below', gap: 10, style: { fontSize: '13px', color: p.success.fg } });

  // Annotations (4)
  callout({ x: 440, y: 72 },  'API Gateway',   { place: 'above', gap: 6,  style: { fontSize: '11px', color: p.primary.fg, fontWeight: 600 } });
  callout({ x: 457, y: 160 }, 'JWT + OAuth',   { place: 'right', gap: 8,  style: { fontSize: '11px', color: p.danger.fg,  fontWeight: 600 } });
  callout({ x: 642, y: 115 }, 'Redis Cluster', { place: 'right', gap: 8,  style: { fontSize: '11px', color: p.success.fg, fontWeight: 500 } });
  callout({ x: 457, y: 273 }, 'horizontal',    { place: 'right', gap: 8,  style: { fontSize: '11px', color: p.primary.a(70) } });

  // Relationships (2)
  callout({ x: 233, y: 192 }, 'Edge Routing',  { place: 'left',  gap: 8,  style: { fontSize: '11px', color: p.info.fg,    fontWeight: 600 } });
  callout({ x: 642, y: 160 }, 'Write-through', { place: 'right', gap: 8,  style: { fontSize: '11px', color: p.success.fg, fontWeight: 500 } });

  // Edge label
  callout({ x: 326, y: 198 }, '<i>Routed</i>', { place: 'above', gap: 12, style: { fontSize: '10px', color: p.info.fg, fontWeight: 500 } });

  // Intra-service (2)
  callout({ x: 424, y: 122 }, 'verify',   { place: 'left',  gap: 6, style: { fontSize: '10px', color: p.primary.a(80) } });
  callout({ x: 456, y: 198 }, 'dispatch', { place: 'left',  gap: 6, style: { fontSize: '10px', color: p.primary.a(80) } });
});
</script>
</body>
</html>
